 쇼핑 및 유튜브 쇼핑 전용 스토어(샵스)가 완전 종료됩니다.","guide_ref":"가이드①② 서비스 종료 공지"},{"id":"yt_b_005","type":"multiple_choice","question":"유튜브 쇼핑 PG 심사는 보통 얼마나 걸리나요?","choices":["1~2 영업일","3~7 영업일","2주 이상","당일 즉시"],"answer":1,"explanation":"PG 심사는 영업일 기준 3~7일 소요됩니다. 진행 상태는 [설정 > 결제설정 > 이용현황]에서 확인 가능해요.","guide_ref":"가이드① STEP 6"},{"id":"yt_b_006","type":"multiple_choice","question":"현재 유튜브 쇼핑(에볼루션)의 어드민 진입 경로는?","choices":["자사몰 어드민 > 판매채널 > 유튜브","전용 스토어 별도 어드민","자사몰 어드민 좌측 LNB > 유튜브 쇼핑","YouTube 스튜디오 > 수익 창출"],"answer":2,"explanation":"현행 에볼루션 서비스는 자사몰 어드민 좌측 LNB의 '유튜브 쇼핑' 메뉴를 통해 접근합니다.","guide_ref":"가이드②"},{"id":"yt_b_007","type":"multiple_choice","question":"결제 프로필에 등록 가능한 카드 브랜드가 아닌 것은?","choices":["VISA","MasterCard","American Express","국내 전용 BC카드"],"answer":3,"explanation":"해외 또는 국내/외 겸용 VISA, MasterCard, American Express만 등록 가능합니다. 국내 전용 카드는 불가예요.","guide_ref":"가이드① STEP 4"},{"id":"yt_b_008","type":"multiple_choice","question":"카페24 계정 1개당 연결 가능한 유튜브 채널 수는?","choices":["1개","3개","5개","무제한"],"answer":0,"explanation":"카페24 계정 1개당 유튜브 채널 1개만 연결 가능합니다. 채널 변경은 기존 연결 해제 후 재연결해야 해요.","guide_ref":"가이드① STEP 3 / FAQ"},{"id":"yt_b_009","type":"multiple_choice","question":"YouTube 채널 스토어 탭에 노출 가능한 상품의 최대 개수는?","choices":["10개","20개","30개","50개"],"answer":2,"explanation":"채널 스토어 상품 진열은 최대 30개까지 선택 가능합니다.","guide_ref":"가이드① STEP 7"},{"id":"yt_b_010","type":"ox","question":"유튜브 쇼핑을 이용하려면 쇼핑몰에 PG(결제대행) 서비스가 반드시 설정되어 있어야 한다.","answer":true,"explanation":"유튜브에 태깅된 상품 클릭 시 자사몰에서 구매가 이루어지므로, PG 세팅이 없으면 판매 자체가 불가합니다.","guide_ref":"예시 CS 5번"},{"id":"yt_b_011","type":"ox","question":"유튜브 쇼핑으로 들어온 주문은 카페24 어드민이 아닌 별도의 유튜브 전용 어드민에서만 관리할 수 있다.","answer":false,"explanation":"에볼루션은 카페24 어드민과 통합 관리 구조입니다. 기존 자사몰과 동일하게 '주문 > 전체주문조회'에서 확인 가능해요. 별도 주문/배송/CS 메뉴가 없는 것이 에볼루션의 특징입니다.","guide_ref":"가이드② 핵심 변경점"},{"id":"yt_b_012","type":"fill_blank","question":"유튜브 쇼핑 연결의 전제 조건으로 반드시 ON 설정해야 하는 것은 '______ 태그'입니다.","answer":"전환 추적","acceptable_answers":["전환 추적","전환추적"],"explanation":"전환 추적 태그 미설정 시 유튜브 쇼핑 연결 자체가 불가능합니다.","guide_ref":"가이드① FAQ"},{"id":"yt_b_013","type":"multiple_choice","question":"에볼루션(현행 서비스)의 구버전 대비 핵심 변경점으로 옳은 것은?","choices":["카페24페이먼츠만 사용 가능","별도 주문/배송/CS 메뉴가 없고 기존 D2C 쇼핑몰에서 통합 처리","전용 디자인 템플릿 제공","유튜브 쇼핑 전용 멀티샵 생성"],"answer":1,"explanation":"에볼루션은 카페24페이먼츠 전용 의무가 없고, 별도 주문/배송/CS 메뉴 없이 기존 D2C 쇼핑몰에서 통합 처리합니다.","guide_ref":"가이드② 핵심 변경점"},{"id":"yt_b_014","type":"ox","question":"유튜브 쇼핑 온보딩 시 쇼핑몰 대표 도메인에 SSL 인증서 발급은 선택사항이다.","answer":false,"explanation":"SSL 인증서 발급은 필수 사전 조건입니다. 미발급 시 유튜브 쇼핑 연동이 불가합니다.","guide_ref":"가이드① 공통 사전 조건"},{"id":"yt_b_015","type":"ox","question":"쇼핑몰에 이용약관 및 환불 정책 페이지 등록은 유튜브 쇼핑 연동의 필수 조건이다.","answer":true,"explanation":"이용약관 및 환불 정책 페이지가 쇼핑몰에 등록되어 있어야 유튜브 쇼핑 연동이 가능합니다.","guide_ref":"가이드① 공통 사전 조건"},{"id":"yt_b_016","type":"multiple_choice","question":"유튜브 쇼핑 에볼루션의 핵심 기능이 아닌 것은?","choices":["제휴 프로그램 (크리에이터 협업)","체크아웃 프로그램 (앱 내 바로 결제)","유튜브 전용 특가 설정","전용 스토어 디자인 편집"],"answer":3,"explanation":"에볼루션은 전용 디자인이 없습니다(접근통제 없음·전용 디자인 없음). 제휴, 체크아웃, 유튜브 전용 특가는 에볼루션의 핵심 기능이에요.","guide_ref":"가이드② 서비스 개요"},{"id":"yt_b_017","type":"multiple_choice","question":"다음 중 유튜브 쇼핑 서비스의 세대 구분이 올바른 것은?","choices":["1세대: 판매채널 > 유튜브 / 2세대: 전용스토어(샵스) / 3세대: 에볼루션","1세대: 에볼루션 / 2세대: 전용스토어 / 3세대: 판매채널","1세대: 전용스토어 / 2세대: 판매채널 / 3세대: 에볼루션","1세대~3세대 모두 현재 운영 중"],"answer":0,"explanation":"1세대(구유튜브, 판매채널 > 유튜브 쇼핑) → 2세대(전용스토어, 샵스) → 3세대(에볼루션, 현행) 순서입니다. 1,2세대는 4/30 종료.","guide_ref":"가이드② SECTION 01"},{"id":"yt_b_018","type":"ox","question":"유튜브 프리미엄 환경에서는 채널 하단 상품 표기가 되지 않는다.","answer":true,"explanation":"유튜브 프리미엄 환경에서는 채널 하단 상품 표기가 안 되는 제한이 있습니다.","guide_ref":"가이드① STEP 7 주의사항"},{"id":"yt_b_019","type":"multiple_choice","question":"YPP 미가입 채널이 유튜브 쇼핑을 활용하는 방법이 아닌 것은?","choices":["제휴 프로그램 심사 요청으로 크리에이터 채널 통해 판매","파트너 특가 설정으로 크리에이터와 직접 협업","내 채널 스토어 탭에서 직접 판매","3P(제3자) 채널을 통한 판매"],"answer":2,"explanation":"YPP 미가입 시 내 채널에서 직접 판매는 불가합니다. 제휴 프로그램 또는 파트너 특가를 통해 타 크리에이터 채널에서 판매해야 해요.","guide_ref":"가이드① YPP 미가입 채널"},{"id":"yt_b_020","type":"fill_blank","question":"유튜브 쇼핑 서비스 세대 중 현재 운영 중인 3세대 서비스의 이름은 '______'입니다.","answer":"에볼루션","acceptable_answers":["에볼루션","Evolution"],"explanation":"3세대 현행 서비스는 '에볼루션'이라는 이름으로, 오픈형 구조로 전환된 확장 서비스입니다.","guide_ref":"가이드② SECTION 01"},{"id":"yt_b_021","type":"ox","question":"유튜브 쇼핑의 주문도 사방넷 등 외부 주문수집 프로그램으로 수집이 가능하다.","answer":true,"explanation":"유튜브 쇼핑 주문도 카페24 자사몰 어드민과 동일한 통합관리 구조이므로, 기존 외부 프로그램도 동일하게 사용 가능합니다. 다만 정확한 호환 여부는 해당 앱 제작사에 확인이 필요합니다.","guide_ref":"예시 CS 25번"},{"id":"yt_b_022","type":"multiple_choice","question":"유튜브 쇼핑 온보딩에서 STEP 2~5는 어떻게 안내되나요?","choices":["별도 매뉴얼을 읽고 직접 설정","카페24 CS팀이 대신 설정","홈 대시보드 튜토리얼로 안내","유튜브 스튜디오에서 안내"],"answer":2,"explanation":"STEP 2~5는 홈 대시보드 튜토리얼로 안내됩니다. 온보딩 구간을 정상 완료하면 홈 대시보드로 자동 진입해요.","guide_ref":"가이드① 온보딩 흐름"},{"id":"yt_b_023","type":"ox","question":"유튜브 쇼핑 연동 시 연동할 YouTube 채널에 소유자 또는 관리자 권한이 필요하다.","answer":true,"explanation":"유튜브 채널 연동에는 해당 채널의 소유자 또는 관리자 권한이 필요합니다. 권한이 없으면 채널이 목록에 나타나지 않아요.","guide_ref":"가이드① STEP 1 / STEP 3"},{"id":"yt_b_024","type":"multiple_choice","question":"유튜브 쇼핑에서 상품이 유튜브에 노출되기까지의 순서로 맞는 것은?","choices":["카페24 상품 등록 → 유튜브 노출 → 구글 심사","카페24 상품 등록 → 구글 상품 심사 → 승인 후 유튜브 노출","유튜브 스튜디오에서 등록 → 카페24 연동 → 노출","구글 심사 → 카페24 등록 → 유튜브 노출"],"answer":1,"explanation":"카페24에서 상품을 등록하면 구글 상품 심사가 진행되고, 승인 완료 후 유튜브에 노출됩니다. 승인 전까지는 노출되지 않아요.","guide_ref":"가이드① STEP 5"},{"id":"yt_b_025","type":"fill_blank","question":"유튜브 쇼핑 성과분석에서 유입 추적에 사용되는 UTM source 값은 '______'입니다.","answer":"youtube","acceptable_answers":["youtube","YouTube"],"explanation":"성과분석은 utm_source=youtube, utm_contents=yt3~~ 형식으로 유입 데이터를 추적합니다.","guide_ref":"가이드② 성과분석"}]},"intermediate":{"world_id":"youtube","stage_id":"intermediate","title":"유튜브 쇼핑 중급","description":"온보딩 절차·상품 상태·메뉴 경로·마이그레이션 (풀 26문항 중 14문항 랜덤 출제)","questions":[{"id":"yt_m_001","type":"multiple_choice","question":"에볼루션 온보딩 시 Google 로그인 후 계정 선택 화면에서 선택해야 하는 것은?","choices":["유튜브 채널(브랜드 계정)","일반 Google 계정(개인 Gmail)","회사 G Suite 관리자 계정","둘 중 아무거나 선택 가능"],"answer":1,"explanation":"반드시 일반 Google 계정(개인 Gmail)을 선택해야 합니다. 유튜브 채널(브랜드 계정)을 선택하면 오류가 발생해요. 자주 실수하는 포인트입니다.","guide_ref":"가이드② 온보딩 STEP 3"},{"id":"yt_m_002","type":"multiple_choice","question":"상품피드에서 '보류' 상태의 의미는?","choices":["Google 심사가 진행 중","Google 심사에서 반려됨","카페24 단계에서 GMC에 전송되지 않은 상품","판매자가 유튜브 노출을 직접 제외한 상품"],"answer":2,"explanation":"보류는 카페24 단계에서 GMC에 아예 전송되지 않은 상태입니다. 대표이미지 없음·판매가 0원 미만·금지 키워드 포함 등이 원인이에요. 반려는 GMC 전송 후 Google 심사에서 반려된 경우예요.","guide_ref":"가이드② 상품 관리"},{"id":"yt_m_003","type":"multiple_choice","question":"샵스(전용스토어) 사용자가 에볼루션으로 마이그레이션하는 절차는?","choices":["기존 연동 해제 후 신규 온보딩 진행","어드민 > 유튜브쇼핑 > 이용약관 동의 클릭 1번으로 전환 완료","신규 카페24 계정 생성 후 새로 시작","카페24 CS팀에 수동 전환 요청"],"answer":1,"explanation":"샵스 사용자는 가장 간단합니다. 백단 마이그레이션이 이미 완료되어 있어, 이용약관 동의 클릭 한 번으로 전환이 완료돼요.","guide_ref":"가이드② 마이그레이션"},{"id":"yt_m_004","type":"multiple_choice","question":"구유튜브(판매채널 > 유튜브 쇼핑) 사용자가 에볼루션으로 전환하는 방법은?","choices":["이용약관 동의 클릭 1번으로 자동 전환","기존 연동을 먼저 해제한 후 어드민 좌측 LNB > 유튜브쇼핑에서 새로 온보딩","전환 없이 자동으로 에볼루션 이용 가능","카페24 CS에 전환 신청서 제출"],"answer":1,"explanation":"구유튜브 사용자는 기존 연동을 먼저 해제한 후, LNB 유튜브쇼핑에서 새로 온보딩을 진행해야 합니다. 샵스 사용자보다 수동 작업이 필요해요.","guide_ref":"가이드② 마이그레이션"},{"id":"yt_m_005","type":"fill_blank","question":"도메인 소유권 인증 실패 시, 어드민 > 쇼핑몰 설정 > 기본 설정 > SEO > 고급 설정 > PC 쇼핑몰 ______ 영역에 구글 제공 HTML 태그를 삽입해야 합니다.","answer":"Head","acceptable_answers":["Head","head","HEAD"],"explanation":"PC 쇼핑몰 Head 영역에 구글 머천트 센터 제공 HTML 태그를 삽입 후 재인증합니다.","guide_ref":"가이드① STEP 2"},{"id":"yt_m_006","type":"multiple_choice","question":"고객이 '유튜브 채널 연결 실패' 메시지를 받았을 때 1차로 확인해야 할 것은?","choices":["카페24 PG 서비스 신청 여부","YPP 요구 사항 충족 여부 / 채널 소유자·관리자 권한","상품 피드 ON 여부","전환 추적 태그 설정 여부"],"answer":1,"explanation":"채널 연결 실패는 주로 YPP 미충족이거나 채널 권한 문제입니다. YPP 미가입이면 제휴 프로그램이나 파트너 특가 활용을 안내합니다.","guide_ref":"가이드① CS 대응"},{"id":"yt_m_007","type":"multiple_choice","question":"PG 심사가 자동 신청되는 시점은?","choices":["유튜브 쇼핑 시작하기 버튼 클릭 즉시","구글 판매자 계정 생성 완료 직후","홈 대시보드 튜토리얼 모든 단계 완료 시","상품 1개 등록 완료 직후"],"answer":2,"explanation":"홈 대시보드 튜토리얼의 모든 단계가 완료되면 PG 심사가 자동으로 진행됩니다.","guide_ref":"가이드① STEP 6"},{"id":"yt_m_008","type":"multiple_choice","question":"유튜브 쇼핑 계정 설정에서 '스토어명'에 해당하는 것은?","choices":["카페24 쇼핑몰 이름","Google 판매자 센터 업체명","YouTube 채널명","도메인 주소"],"answer":1,"explanation":"스토어명 = Google 판매자 센터 업체명입니다. 브랜드명 권장 형식은 '국문명 영문명(소문자)'이며, 특수기호·영문 대문자만 입력 시 웹사이트 주소로 표시될 수 있어요.","guide_ref":"가이드① 운영 가이드"},{"id":"yt_m_009","type":"multiple_choice","question":"특정 상품(예: 주류)을 유튜브에 전혀 노출하고 싶지 않을 때 사용할 기능은?","choices":["상품 피드 OFF","상품 전송 제외 처리","파트너 특가 설정","상품 공개 범위 '비공개'"],"answer":1,"explanation":"상품피드 내 '전송 제외' 기능을 사용하면 구글 판매자 센터에 등록되지 않아 유튜브에 전혀 노출되지 않습니다.","guide_ref":"예시 CS 16번"},{"id":"yt_m_010","type":"multiple_choice","question":"체크아웃 프로그램을 활성화할 수 있는 조건은?","choices":["YPP 가입 채널이거나 제휴프로그램 이용 중일 것","유튜브 구독자 1만 명 이상","카페24페이먼츠 사용 중","PG 심사 완료만 되면 됨"],"answer":0,"explanation":"체크아웃 프로그램은 YPP 채널이거나 제휴프로그램 이용 중인 경우에만 활성화 가능합니다.","guide_ref":"가이드② 체크아웃"},{"id":"yt_m_011","type":"fill_blank","question":"간접전환 기여매출은 유튜브 유입 후 ____일 이내 다른 경로로 재방문하여 구매한 경우 집계됩니다.","answer":"30","acceptable_answers":["30"],"explanation":"유튜브 쇼핑은 쿠키 유지 조건 하에 30일까지 간접전환 기여매출이 집계됩니다.","guide_ref":"예시 CS 23번"},{"id":"yt_m_012","type":"multiple_choice","question":"제휴 프로그램과 파트너 특가의 관계로 옳은 것은?","choices":["서로 독립적이라 어느 것이든 단독 사용 가능","파트너 특가는 제휴프로그램 이용 중인 경우에만 설정 가능","제휴프로그램은 파트너 특가 활성화 시에만 이용 가능","둘은 동일 기능의 다른 이름"],"answer":1,"explanation":"파트너 특가는 제휴프로그램 이용 중인 경우에만 설정 가능한 유튜브 전용 특가입니다.","guide_ref":"가이드② 제휴·체크아웃"},{"id":"yt_m_013","type":"multiple_choice","question":"성과분석 데이터 기준으로 옳은 것은?","choices":["실시간 집계 / 주문 생성 기준","전일 집계 / 결제완료 기준","월 1회 집계 / 구매확정 기준","주 1회 집계 / 배송완료 기준"],"answer":1,"explanation":"성과분석 데이터는 전일 집계(실시간 아님), 결제완료 기준입니다.","guide_ref":"가이드② 성과분석"},{"id":"yt_m_014","type":"multiple_choice","question":"상품피드에서 '반려' 상태의 의미는?","choices":["카페24에서 GMC로 전송 안 된 상품","GMC에 전송은 됐으나 Google 심사에서 반려된 상품","판매자가 직접 노출 제외한 상품","GMC 심사가 진행 중인 상품"],"answer":1,"explanation":"반려는 GMC에 전송은 됐으나 Google 심사에서 반려된 상태입니다. GMC에서 반려 사유를 확인 후 수정해야 해요. 보류(카페24 단계 미전송)와 구분해야 합니다.","guide_ref":"가이드② 상품 관리"},{"id":"yt_m_015","type":"multiple_choice","question":"온보딩 완료 후 연결에 문제가 있을 때 확인할 수 있는 경로는?","choices":["YouTube 스튜디오 > 설정","카페24 어드민 > 부가서비스","유튜브쇼핑 > 설정 > 계정설정 > 확인 필요 탭","구글 판매자 센터 > 진단"],"answer":2,"explanation":"온보딩 완료 후 문제가 있으면 대시보드 상단 빨간색 알림 또는 설정 > 계정설정 > 확인필요 탭에서 GMC 계정 문제, 토큰 문제 등 항목별 원인과 조치를 확인할 수 있어요.","guide_ref":"가이드② 온보딩 STEP 5"},{"id":"yt_m_016","type":"fill_blank","question":"PG 심사 필수 조건 중 상품은 최소 ____개 이상 등록되어 있어야 합니다.","answer":"1","acceptable_answers":["1"],"explanation":"PG 심사에는 상품 최소 1개 이상 등록이 필요합니다. 판매가도 반드시 입력되어 있어야 해요.","guide_ref":"가이드① STEP 5·6"},{"id":"yt_m_017","type":"ox","question":"상품 수정 시 구글 상품 심사 시간이 추가된다.","answer":true,"explanation":"승인 대기 중 상품을 수정하면 심사 시간이 추가됩니다. 고객에게 사전 안내가 필요해요.","guide_ref":"가이드① STEP 5"},{"id":"yt_m_018","type":"multiple_choice","question":"제휴프로그램 활성화를 위해 수수료를 설정하는 곳은?","choices":["카페24 어드민 > 유튜브쇼핑 > 확장","유튜브 스튜디오에서 수수료 설정","구글 판매자 센터 > 수수료 관리","카페24 페이먼츠 > 수수료"],"answer":1,"explanation":"제휴프로그램 활성화는 유튜브 스튜디오에서 수수료를 설정해야 합니다. 카페24 어드민에서는 제휴프로그램 신청을 하고, 수수료 설정은 유튜브 스튜디오에서 해요.","guide_ref":"가이드② 제휴 프로그램"},{"id":"yt_m_019","type":"ox","question":"4/30 이후 에볼루션 전환을 하지 않은 샵스 사용자는 전용스토어 접근 자체가 불가하다.","answer":true,"explanation":"4/30 이후 미전환 샵스 사용자는 전용스토어 접근이 불가해지고, 구유튜브 사용자는 유튜브 채널 상품 표시가 중단됩니다.","guide_ref":"가이드② 마이그레이션"},{"id":"yt_m_020","type":"multiple_choice","question":"보류 상태가 발생하는 주요 원인이 아닌 것은?","choices":["상품명에 금지 키워드 포함","판매가 0원 미만","상품 대표 이미지 없음","PG 심사 미완료"],"answer":3,"explanation":"보류는 상품 정보 자체의 문제(금지 키워드, 비정상 가격, 이미지 없음 등)로 카페24 단계에서 GMC 전송이 안 된 상태입니다. PG 심사는 보류와 무관해요.","guide_ref":"가이드② 상품 관리"},{"id":"yt_m_021","type":"multiple_choice","question":"GMC 승인 후 유튜브 스튜디오에서 상품이 보이지 않을 때 조치로 맞는 것은?","choices":["즉시 카페24 CS에 문의","72시간 대기 후에도 안 보이면 1:1 문의(라이브 일정 포함)","상품을 삭제 후 재등록","PG 심사를 다시 신청"],"answer":1,"explanation":"GMC 승인 후 72시간이 지나도 유튜브 스튜디오에서 상품이 보이지 않으면 1:1 문의로 라이브 일정과 함께 접수하세요.","guide_ref":"가이드② 상품피드 전송 흐름"},{"id":"yt_m_022","type":"multiple_choice","question":"제휴 상품의 수수료 설정 단위는?","choices":["상품별 개별 설정 가능","카테고리별로만 설정 가능","전 상품 동일 수수료만 가능","크리에이터별로만 설정 가능"],"answer":1,"explanation":"제휴 상품 수수료는 카테고리별로 입력 가능하며, 상품별 개별 설정은 불가합니다.","guide_ref":"예시 CS 9번"},{"id":"yt_m_023","type":"ox","question":"유튜브 쇼핑 초기화 시 모든 연결 설정이 초기화되므로 신중하게 진행해야 한다.","answer":true,"explanation":"초기화 시 모든 연결 설정이 초기화됩니다. 채널 연결, 상품피드, 제휴 설정 등 전체가 리셋되므로 신중해야 해요.","guide_ref":"가이드② 계정설정"},{"id":"yt_m_024","type":"multiple_choice","question":"유튜브 쇼핑에서 상품을 특정 시점에 공개하고 싶을 때 활용하는 기능은?","choices":["상품 피드 ON/OFF","전송 제외 처리","상품공개 설정","파트너 특가"],"answer":2,"explanation":"신제품 런칭, 이벤트 오픈 등 특정 시점에 상품을 공개하려면 '상품공개 설정'을 활용합니다. 경로: 유튜브쇼핑 > 확장 > 상품공개","guide_ref":"가이드② 상품관리"},{"id":"yt_m_025","type":"multiple_choice","question":"제휴프로그램에서 정산 기준으로 맞는 것은?","choices":["주문 생성 기준 즉시 정산","구매확정 후 15일 뒤 정산금액 확정, 매월 1일 수수료 청구","배송 완료 즉시 정산","크리에이터가 직접 청구"],"answer":1,"explanation":"구매확정 기준으로 15일 후 정산금액이 확정되고, 전월 말일 합산하여 매월 1일에 판매자에게 수수료를 청구하는 구조입니다.","guide_ref":"예시 CS 11번"},{"id":"yt_m_026","type":"fill_blank","question":"유튜브 채널 변경 시 기존 채널의 영상에 등록된 상품 태깅은 모두 ______됩니다.","answer":"제거","acceptable_answers":["제거","삭제"],"explanation":"채널을 변경하면 기존에 심사 승인된 상품은 재심사 불필요하지만, 영상에 등록된 상품 태깅은 모두 제거됩니다.","guide_ref":"예시 CS 13번"}]},"advanced":{"world_id":"youtube","stage_id":"advanced","title":"유튜브 쇼핑 고급","description":"실전 CS 시나리오·트러블슈팅·복합 상황 대응 (풀 25문항 중 13문항 랜덤 출제)","questions":[{"id":"yt_a_001","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 쇼핑을 연동하려는데 id@pages.googleplus.com 이메일 형식은 지원하지 않는다는 문구가 보여요.\"\n\n가장 적절한 답변은?","choices":["해당 이메일로 본인 확인 절차를 거쳐야 한다고 안내","@pages.googleplus.com은 실제 이메일이 아닌 브랜드 계정 식별자이므로, 실제 운영에 사용할 Gmail 계정으로 연동 필요하다고 안내","YouTube 스튜디오에서 이메일 주소를 먼저 변경해야 한다고 안내","YPP 가입 후 재시도하라고 안내"],"answer":1,"explanation":"@pages.googleplus.com은 실제 이메일이 아닌 브랜드 계정 식별자입니다. 실제 유튜브 쇼핑 운영에 사용할 Gmail 형식 계정으로 연동해야 한다고 안내하세요.","guide_ref":"예시 CS 1번"},{"id":"yt_a_002","type":"multiple_choice","question":"[고객 문의]\n\"기존에 사용하던 유튜브 쇼핑이 사라졌어요! 유튜브 채널명 클릭하니까 일반 어드민으로 이동돼요.\"\n\n가장 적절한 대응 순서는?","choices":["현행 서비스 접속 경로 안내 → 멀티몰 이동 버튼 사용법","전용스토어가 신규 서비스로 마이그레이션됨 안내 → 약관 동의만 하면 그대로 이용 가능 → 미동의 시 4/30까지 설정 초기화 경고 → 사용 방법 설명","YouTube 스튜디오에서 채널 권한 확인 요청","유튜브 쇼핑 시작하기 재진입 안내"],"answer":1,"explanation":"고객이 '유튜브 채널명 클릭하니 일반 어드민'이라고 한 건 전용스토어가 에볼루션으로 바뀐 것을 모르는 상황이에요. (1) 서비스 변경 안내 (2) 약관 동의 1번으로 이용 가능 (3) 4/30 미동의 시 초기화 경고 (4) 사용법 순서로 안내합니다.","guide_ref":"예시 CS 4번 (팀장 코멘트)"},{"id":"yt_a_003","type":"multiple_choice","question":"[고객 문의]\n\"제휴 제품 검색 페이지에 제 상품이 검색되지 않아요!\"\n\n가장 먼저 확인할 것은?","choices":["카페24 PG 서비스 설정 상태","유튜브 스튜디오 내 수수료율이 0%가 아닌지 + 상품 승인 상태","YPP 가입 여부","체크아웃 프로그램 활성화 여부"],"answer":1,"explanation":"가장 흔한 원인은 수수료율 0%입니다. 유튜브 스튜디오에서 수수료율 확인 + 상품 승인 상태 점검이 우선이에요. 0%가 아닌데도 문제 지속 시 일정 시간 대기 후 카페24 게시판 문의 안내.","guide_ref":"예시 CS 8번"},{"id":"yt_a_004","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 채널을 3개 가지고 있는데, 하나의 쇼핑몰에 모두 연동 가능한가요? 불가능하면 서브 채널에 상품 등록 다른 방법은?\"\n\n가장 완전한 답변은?","choices":["1몰당 1채널 제한만 안내","1몰당 1채널 제한 + (스토어탭 노출 원하면) 멀티몰 생성해서 채널별 연결 / (영상 내 태깅 원하면) 제휴프로그램 또는 파트너 특가 활용 안내","모든 채널을 하나의 계정으로 병합하라고 안내","카페24 CS에 수동 연동 요청하라고 안내"],"answer":1,"explanation":"고객 니즈에 따라 해결책이 달라요. 스토어 탭 노출 → 채널 수만큼 멀티몰 생성 후 각각 연결. 영상 태깅만 → 제휴프로그램 상품 URL 또는 파트너 특가 활용. 단순 '안 됩니다'보다 대안 제시가 중요합니다.","guide_ref":"예시 CS 10번 (팀장 코멘트)"},{"id":"yt_a_005","type":"multiple_choice","question":"[고객 문의]\n\"상품 피드에서 어제까지 승인이었는데 오늘 대기 상태예요. 그런데 스토어 탭에는 정상 노출 중이에요.\"\n\n적절한 답변은?","choices":["스토어 탭 노출이 잘못된 것이니 내려야 한다고 안내","상품 수정 시 재전송 발생으로 대기 상태가 되며, 기존 승인 상품이므로 심사 완료 전까지 스토어 노출이 유지된다고 안내","구글 심사 오류이므로 카페24에서 처리해주겠다고 안내","피드 상태는 무시해도 된다고 안내"],"answer":1,"explanation":"상품 수정 시 피드 재전송이 필요해 대기로 전환됩니다. 기존 승인 상품이므로 심사 완료 전까지 스토어 노출은 유지돼요. 재심사는 최초 심사보다 빠릅니다.","guide_ref":"예시 CS 21번"},{"id":"yt_a_006","type":"multiple_choice","question":"[고객 문의]\n\"GMC 계정 문제로 상품이 모두 반려됐는데, 성과분석에 어제 매출이 잡혀있어요.\"\n\n정확한 답변은?","choices":["시스템 오류이므로 재집계 요청하겠다고 안내","간접전환 기준 쿠키 유지 조건 하에 30일 이내 재방문 구매가 기여매출로 집계된다고 설명","상품 상태와 매출은 무관하므로 걱정 없다고 단순 안내","카페24와 GMC 시스템이 달라 생긴 착오라고 안내"],"answer":1,"explanation":"간접전환 기여매출은 30일 이내 재방문 구매도 집계합니다. 고객이 '유튜브로 구매한 적 없다'고 재문의하면 JIRA 발행해서 집계 사유 확인이 필요해요.","guide_ref":"예시 CS 23번 (팀장 코멘트)"},{"id":"yt_a_007","type":"multiple_choice","question":"[고객 문의]\n\"채널을 3개 가지고 있는데 채널 선택 페이지에 2개만 나와요.\"\n\n확인해야 할 사항은?","choices":["로그인한 구글 계정에 해당 채널 권한이 없거나, 미노출 채널이 YPP 미충족일 가능성","카페24 쇼핑몰 등급 업그레이드 필요","결제 프로필 재등록 필요","전환 추적 태그 재설정 필요"],"answer":0,"explanation":"(1) 로그인한 구글 계정에 해당 채널 권한이 없거나 (2) 미노출 채널이 YPP 미충족. 유튜브 스튜디오에서 권한 확인을 안내합니다.","guide_ref":"예시 CS 24번"},{"id":"yt_a_008","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 쇼핑 시작하기를 누르면 '쇼핑몰의 결제수단이 설정되지 않았어요.' 알럿이 나와요.\"\n\n고객이 쉽게 이해할 수 있게 안내하려면?","choices":["PG 서비스 신청 필수라고만 간단히 안내","PG 서비스 신청 필수 안내 + '유튜브 태깅 상품 클릭 시 자사몰에서 구매가 이루어지므로, PG 미설정 시 판매 불가해 이 알럿이 나온다'고 배경 설명","시스템 오류이니 잠시 후 재시도 안내","카페24 CS에 수동 세팅 요청 안내"],"answer":1,"explanation":"'필수입니다' 안내에 왜 필요한지 맥락을 같이 설명하면 고객 이해도가 훨씬 높아져요.","guide_ref":"예시 CS 5번 (팀장 코멘트)"},{"id":"yt_a_009","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 쇼핑 소유권 주장이 실패했어요.\"\n\n우선 안내할 내용은?","choices":["즉시 JIRA 발행해서 개발팀에 전달하겠다고 안내","일시적/구글 시스템 오류 가능성 → 시간 두고 재클릭 요청 → 동일 증상 지속 시 캡처와 함께 문의 접수 안내","쇼핑몰 도메인을 변경해야 한다고 안내","해당 기능은 현재 제공되지 않는다고 안내"],"answer":1,"explanation":"소유권 주장 실패는 주로 일시적 또는 구글 시스템 오류입니다. 먼저 재시도하도록 안내하고, 지속 시 캡처와 함께 문의 안내.","guide_ref":"예시 CS 3번"},{"id":"yt_a_010","type":"multiple_choice","question":"[고객 문의]\n\"주문이 상품 준비중에서는 검색되는데 전체 주문조회에서는 안 돼요.\"\n\n안내할 내용은?","choices":["유튜브 주문은 전체 주문조회에서 안 되는 구조라고 안내","전체주문조회의 필터 설정 확인 → '초기화 > 검색조건저장' 후 재확인 안내","주문 누락이니 즉시 JIRA 발행하겠다고 안내","PG 심사 미완료로 인한 문제라고 안내"],"answer":1,"explanation":"전체주문조회에 필터가 설정되어 있어서 특정 조건 주문만 표시된 것일 수 있어요. '초기화 > 검색조건저장' 후 재확인 안내.","guide_ref":"예시 CS 18번"},{"id":"yt_a_011","type":"multiple_choice","question":"[고객 문의]\n\"제휴프로그램을 구글폼으로 신청했고, 내일 크리에이터 광고 예정이라 빠른 사용이 필요해요.\"\n\n적절한 대응은?","choices":["일반 심사 기간(1~2주)만 안내하고 대기 요청","심사 기간 안내 + 긴급 상황 고려하여 예외 오픈 가능한지 점검 후 재안내 + 내부에서 '제휴프로그램 예외 처리 요청 JIRA' 발행","크리에이터 일정을 연기하도록 안내","구글폼 재작성 요청"],"answer":1,"explanation":"긴급 상황에서는 예외 오픈 요청이 가능한지 내부 점검 후 안내합니다. 내부적으로는 JIRA 발행(제휴프로그램 예외 처리 요청) + 슬랙 푸시가 필요해요. YPP 예외처리 JIRA와 다르니 주의.","guide_ref":"예시 CS 22번 (팀장 코멘트)"},{"id":"yt_a_012","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 쇼핑으로 해외 판매/해외 배송이 가능한가요?\"\n\n정확한 답변은?","choices":["유튜브 쇼핑은 해외 배송을 전혀 지원하지 않음","상품명에 '해외 배송·해외 결제' 단어 포함 시 승인 불가. 상품명에 해당 단어 없고 승인 완료됐으며 자사몰에서 해외배송 서비스 제공 중이면 해외 배송 가능","카페24페이먼츠 사용 시에만 해외 배송 가능","전용스토어에서만 해외 배송 가능"],"answer":1,"explanation":"에볼루션(자사몰 랜딩)에서는 승인된 상품에 한해 자사몰이 해외 배송을 지원하면 가능합니다. 단, 상품명에 '해외 배송/결제' 단어가 있으면 GMC 승인 불가.","guide_ref":"예시 CS 6번"},{"id":"yt_a_013","type":"multiple_choice","question":"[고객 문의]\n\"제휴프로그램으로 상품 판매 시 정산은 어떻게 되나요?\"\n\n올바른 설명은?","choices":["판매 즉시 크리에이터 계좌로 수수료 입금","구매확정 후 15일 뒤 정산금액 확정, 결제프로필에 등록된 결제수단으로 매월 1일 청구","크리에이터가 직접 판매자에게 수수료 청구","카페24가 중간에서 수수료 분배"],"answer":1,"explanation":"구매확정 기준 15일 후 정산 확정 → 전월 말일 합산 → 매월 1일 결제프로필 결제수단으로 청구. 유튜브에서 크리에이터에게 정산할 금액을 계산합니다.","guide_ref":"예시 CS 11번"},{"id":"yt_a_014","type":"multiple_choice","question":"[고객 문의]\n\"파트너 특가와 제휴프로그램의 차이가 뭐에요?\"\n\n올바른 설명은?","choices":["파트너 특가는 특정 파트너에게만 특별 할인가로 상품 전송 + 별도 정산 필요. 제휴프로그램은 불특정 다수 크리에이터에게 상품 공유 + 자동 정산","둘은 동일 기능의 다른 이름","파트너 특가가 더 저렴한 수수료율 적용","제휴프로그램은 YPP 채널만 이용 가능"],"answer":0,"explanation":"파트너 특가: 특정 크리에이터 한정 할인 적용, 정산은 별도. 제휴프로그램: 불특정 다수에게 공유, 자동 정산. 공통점은 둘 다 YPP 미가입 고객도 이용 가능하다는 것.","guide_ref":"예시 CS 20번 (팀장 코멘트)"},{"id":"yt_a_015","type":"multiple_choice","question":"[고객 문의]\n\"제휴프로그램 수수료에 부가세도 포함되나요?\"\n\n정확한 답변은?","choices":["부가세가 별도 추가됨","판매가 기준으로 수수료 부과되므로 부가세가 따로 추가되지 않음 (판매가 = 상품가 + 부가세)","부가세는 크리에이터가 부담","카페24가 부가세 별도 청구"],"answer":1,"explanation":"상품 등록 시 판매가 = 상품가 + 과세(부가세)로 설정되고, 카페24는 판매가 정보만 유튜브에 전달합니다. 유튜브는 판매가 기준으로 수수료를 부과하므로 별도 부가세 추가는 없어요.","guide_ref":"예시 CS 27번 (팀장 코멘트)"},{"id":"yt_a_016","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 쇼핑을 쓰려고 PG 신청했는데 PG 심사가 반려되었어요. 이유가 뭐에요?\"\n\n적절한 안내는?","choices":["카페24에서 반려 사유를 확인해드리겠다고 안내","PG 심사·세팅은 PG사 정책에 따르므로 신청한 PG사에 반려 사유를 직접 확인해야 한다고 안내","다른 PG사로 재신청하라고 안내","유튜브 쇼핑은 특정 PG사만 사용 가능하다고 안내"],"answer":1,"explanation":"유튜브 쇼핑 PG 서비스 신청은 필수이지만, PG 심사·세팅은 PG사 및 쇼핑몰 정책에 따라 적용됩니다. 반려 사유는 신청한 PG사에 직접 확인이 필요해요.","guide_ref":"예시 CS 26번"},{"id":"yt_a_017","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 쇼핑 연동은 완료했지만 제 채널은 수익 창출 조건이 안 맞아요. 계약한 유튜버의 채널을 대신 연동시켜야 하나요?\"\n\n적절한 안내는?","choices":["고객 채널 해제 + 크리에이터 채널 연동만 안내","채널 변경은 가능하나 리스크(피드 초기화, 태깅 제거, 계정 공유 필요) 안내 + 제휴프로그램·파트너 특가 활용이 더 적합할 수 있다고 대안 제시","수익 창출 조건 안 맞으면 유튜브 쇼핑 이용 불가라고 안내","크리에이터에게 카페24 어드민 접근 권한을 줘야 한다고 안내"],"answer":1,"explanation":"채널 해제·재연결은 가능하지만, 피드 초기화·태깅 제거 등 리스크가 있고 계정 공유도 필요할 수 있어요. 제휴프로그램이나 파트너 특가를 활용하면 채널 변경 없이 크리에이터 협업이 가능합니다.","guide_ref":"예시 CS 14번"},{"id":"yt_a_018","type":"multiple_choice","question":"[고객 문의]\n\"체크아웃 프로그램이 뭐에요?\"\n\n핵심 설명은?","choices":["자사몰에서 간편 결제를 제공하는 기능","유튜브 모바일 앱에서 영상 보면서 외부 사이트 이동 없이 바로 상품 확인 및 구매가 가능한 서비스","유튜브 광고 결제 기능","구글 판매자 센터의 재고 관리 기능"],"answer":1,"explanation":"체크아웃 프로그램은 유튜브 모바일 앱에서 영상 시청 중 외부 사이트 이동 없이 상품정보 확인 + 구매까지 완료할 수 있는 기능이에요. 구매자 이탈 가능성을 줄여줍니다.","guide_ref":"예시 CS 15번"},{"id":"yt_a_019","type":"multiple_choice","question":"[고객 문의]\n\"제휴프로그램으로 상품을 판매하고 싶은데 어떤 항목을 설정해야 하나요?\"\n\n필수 확인 항목이 아닌 것은?","choices":["수수료율 설정 (0% 아닌 값)","결제프로필 세팅 완료","구매확정 기능 설정","유튜브 프리미엄 계정 보유"],"answer":3,"explanation":"제휴프로그램 이용에 유튜브 프리미엄은 필요 없어요. 필수 항목: 수수료율 설정, 결제프로필 세팅, 구매확정 기능 설정, 상품 카테고리 설정, 상품 승인 상태 확인 등입니다.","guide_ref":"예시 CS 19번 (팀장 코멘트)"},{"id":"yt_a_020","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 쇼핑으로 주문이 들어왔는데, 이후 주문/배송/환불은 어떻게 하면 돼요?\" (신규 회원, 기존 자사몰 없었음)\n\n안내할 범위로 맞는 것은?","choices":["유튜브 쇼핑 전용 주문관리 메뉴 안내","자사몰 절차와 동일하게 처리 + 신규 회원이므로 주문-배송-CS 처리 전반 과정 안내 필요","카페24 CS팀이 대신 처리해주겠다고 안내","유튜브 측에 문의하라고 안내"],"answer":1,"explanation":"에볼루션은 자사몰 랜딩 구조이므로 주문/배송/환불 모두 자사몰 절차와 동일합니다. 신규 회원이라면 주문~배송~CS 처리 전반 과정(입금전→상품준비→배송→구매확정, 취소/교환/반품/환불)을 함께 안내해야 해요.","guide_ref":"예시 CS 17번"},{"id":"yt_a_021","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 스토어와 동영상에 상품을 다르게 노출할 수 있나요?\"\n\n정확한 답변은?","choices":["불가능하다. 스토어와 동영상 노출 상품은 항상 동일","스토어에는 노출하지 않고 특정 동영상에만 태그 가능. 다만 기존 영상에 상품 표기 시 동일한 상품 세트가 노출됨","동영상마다 개별 상품을 자유롭게 선택 가능","유튜브 스튜디오에서만 설정 가능하고 카페24에서는 불가"],"answer":1,"explanation":"스토어 미노출 + 특정 동영상에만 태그는 가능합니다. 다만 기존 영상에 상품을 표기할 때는 개별 선택이 아닌 동일 상품 세트(스토어 상품과 동일)가 노출되는 방식이에요.","guide_ref":"가이드① FAQ"},{"id":"yt_a_022","type":"multiple_choice","question":"[고객 문의]\n\"제휴프로그램 수수료 정산에서, 결제 수단별 수수료는 얼마인가요?\"\n\n정확한 답변은?","choices":["결제수단별로 제휴 수수료가 다르게 적용됨","제휴 수수료는 기본 수수료 또는 카테고리별 수수료로만 설정되며 결제수단별 차이 없음. 결제수단별 PG 수수료는 사용 중인 PG사에 문의 필요","모든 결제수단에 동일하게 3% 적용","유튜브가 결제수단별 수수료를 자동 계산"],"answer":1,"explanation":"제휴 수수료는 기본 수수료 또는 카테고리별로 설정되며, 결제수단별 차이는 없어요. 자사몰 PG 수수료는 사용 중인 PG사 정책이므로 PG사에 문의해야 합니다.","guide_ref":"예시 CS 28번"},{"id":"yt_a_023","type":"multiple_choice","question":"[고객 문의]\n\"제휴프로그램 심사 기간이 어떻게 되나요?\"\n\n정확한 정보는?","choices":["1~3 영업일","1주~2주","최대 5주","즉시 활성화"],"answer":1,"explanation":"제휴프로그램 심사는 일반적으로 1주~2주 소요됩니다.","guide_ref":"예시 CS 22번"},{"id":"yt_a_024","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 채널 변경하면 기존 심사 승인 상품도 다시 심사 받아야 하나요?\"\n\n정확한 답변은?","choices":["네, 모든 상품 재심사 필요","아니오, 기존 승인 상품은 재심사 불필요. 단, 영상에 등록된 상품 태깅은 모두 제거됨","채널 변경 자체가 불가능","상품과 태깅 모두 그대로 유지됨"],"answer":1,"explanation":"채널을 변경해도 기존 심사 승인 상품은 재심사 불필요합니다. 단, 영상에 등록된 상품 태깅은 모두 제거되는 점에 유의해야 해요.","guide_ref":"예시 CS 13번"},{"id":"yt_a_025","type":"multiple_choice","question":"[고객 문의]\n\"유튜브 쇼핑에서 상품이 보이지 않아요.\"\n\n확인할 순서로 맞는 것은?","choices":["① 구글 승인 대기 확인 → ② 상품 피드 ON 확인 → ③ 상품 수정 이력 확인 → ④ YouTube 스튜디오에서 직접 선택 여부 확인","① PG 심사 확인 → ② 결제 프로필 확인 → ③ 채널 권한 확인","① 유튜브 프리미엄 여부 확인 → ② 도메인 SSL 확인","① JIRA 발행 → ② 고객에게 대기 요청"],"answer":0,"explanation":"상품 미노출 시: ① 구글 승인 대기 여부 ② 상품 피드 ON 상태 ③ 상품 수정으로 인한 재심사 ④ YouTube 스튜디오 '직접 제품 선택하기'로 수동 지정 여부를 순서대로 확인합니다.","guide_ref":"가이드① CS 대응 / STEP 7"}]}},"order":{"beginner":{"world_id":"order","stage_id":"beginner","title":"주문관리 초급","description":"주문 프로세스·배송 상태·기본 개념 (풀 25문항 중 13문항 랜덤 출제)","questions":[{"id":"od_b_001","type":"ox","question":"무통장 입금 주문건은 입금 확인 후 자동으로 배송준비중 상태로 변경된다.","answer":false,"explanation":"무통장 입금 주문은 운영자가 직접 입금 확인 처리를 해야 배송준비중(또는 상품준비중)으로 변경됩니다.","guide_ref":"주문관리 슬라이드 3"},{"id":"od_b_002","type":"multiple_choice","question":"카페24에서 주문 상태의 올바른 순서는?","choices":["입금전 → 상품준비중 → 배송준비중 → 배송중 → 배송완료","입금전 → 배송준비중 → 배송대기 → 배송중 → 배송완료","배송준비중 → 입금전 → 배송중 → 배송완료","입금전 → 배송중 → 배송준비중 → 배송완료"],"answer":1,"explanation":"정확한 순서: 입금전 → 배송준비중 → 배송대기 → 배송중 → 배송완료입니다.","guide_ref":"주문관리 슬라이드 2~7"},{"id":"od_b_003","type":"ox","question":"배송완료 상태의 주문은 이전 상태(배송중)로 되돌리기가 가능하다.","answer":false,"explanation":"배송완료 메뉴에서는 이전 상태로 되돌리기가 불가합니다. 필요 시 사유와 주문번호를 기재하여 1:1 문의 접수가 필요합니다.","guide_ref":"주문관리 슬라이드 7"},{"id":"od_b_004","type":"multiple_choice","question":"배송준비중 관리에서 배송중 처리를 하려면 무엇을 입력해야 하나요?","choices":["고객 연락처","택배사 선택 + 송장번호 기재","상품 바코드","결제 승인번호"],"answer":1,"explanation":"배송준비중 관리에서 주문 선택 후 택배사를 선택하고 송장번호를 기재한 뒤 배송중처리 버튼을 클릭합니다.","guide_ref":"주문관리 슬라이드 4"},{"id":"od_b_005","type":"ox","question":"구매 확정된 주문은 취소, 교환, 반품 처리가 불가하다.","answer":true,"explanation":"구매 확정은 이후 취소/교환/반품 의사가 없다는 뜻입니다. 불가피한 경우 운영자가 구매 확정을 취소한 후 CS 처리를 진행해야 합니다.","guide_ref":"주문관리 슬라이드 28"},{"id":"od_b_006","type":"multiple_choice","question":"미입금 주문 자동 취소를 설정하는 경로는?","choices":["주문 > 전체 주문 조회 > 자동 취소","쇼핑몰 설정 > 주문 설정 > 주문 후 설정 > 미입금 주문 자동 취소","고객 > 회원 관리 > 자동 취소","배송 > 자동 취소 설정"],"answer":1,"explanation":"쇼핑몰 설정 > 주문 설정 > 주문 후 설정에서 미입금 주문 자동 취소를 사용함으로 설정하고 기한을 지정합니다.","guide_ref":"주문관리 슬라이드 3"},{"id":"od_b_007","type":"ox","question":"현금영수증은 신용카드 결제 주문건에도 발급이 가능하다.","answer":false,"explanation":"현금영수증은 현금결제(계좌이체, 가상계좌, 무통장입금 등)에 대해서만 발급 가능합니다. 신용카드, 휴대폰결제 주문건은 발급 불가합니다.","guide_ref":"주문관리 슬라이드 31"},{"id":"od_b_008","type":"multiple_choice","question":"구매자가 직접 취소/교환/반품 신청이 가능하도록 설정하는 경로는?","choices":["주문 > 취소/교환/반품/환불","쇼핑몰 설정 > 주문 설정 > 주문 후 설정 > 구매자 취소/교환/반품 신청 설정","고객 > 회원 관리 > CS 설정","상품 > 상품 설정 > 반품 설정"],"answer":1,"explanation":"쇼핑몰 설정 > 주문 설정 > 주문 후 설정 > 구매자 취소/교환/반품 신청 설정에서 사용함으로 설정합니다.","guide_ref":"주문관리 슬라이드 8"},{"id":"od_b_009","type":"fill_blank","question":"배송완료 자동체크 앱은 자동 처리 가능한 ____개의 택배사 주문건을 자동으로 배송완료 처리합니다.","answer":"9","acceptable_answers":["9"],"explanation":"배송완료 자동체크 앱은 9개의 택배사 주문건에 대해 택배 배송상황에 맞춰 자동으로 배송완료 처리합니다.","guide_ref":"주문관리 슬라이드 7"},{"id":"od_b_010","type":"ox","question":"묶음 배송은 수령자 정보가 동일한 주문건만 가능하다.","answer":true,"explanation":"수령자 정보가 동일한 주문건을 일괄 선택하여 묶음 배송 처리가 가능합니다.","guide_ref":"주문관리 슬라이드 4"},{"id":"od_b_011","type":"multiple_choice","question":"통계 데이터의 업데이트 주기는?","choices":["실시간","1시간마다","1일마다","1주마다"],"answer":1,"explanation":"매출/상품/고객 분석 통계 데이터는 1시간마다 업데이트됩니다. 단, 적립금/예치금 분석은 실시간 확인 가능합니다.","guide_ref":"주문관리 슬라이드 45"},{"id":"od_b_012","type":"ox","question":"카페24 통계 자료는 국세청 제출용으로 사용할 수 있다.","answer":false,"explanation":"통계 자료는 국세청/기타 제출용으로 사용할 수 없으며, 쇼핑몰 운영 참고 자료로만 이용해야 합니다.","guide_ref":"주문관리 슬라이드 45"},{"id":"od_b_013","type":"multiple_choice","question":"주문 경로를 확인하는 방법은?","choices":["고객에게 직접 문의","주문번호 앞 아이콘으로 확인","배송사 홈페이지 확인","PG사에 문의"],"answer":1,"explanation":"검색된 주문 결과에서 주문번호 앞 아이콘에 따라 어떤 주문/매출 경로로 주문된 건인지 확인 가능합니다.","guide_ref":"주문관리 슬라이드 2"},{"id":"od_b_014","type":"fill_blank","question":"구매 확정 자동체크 기능은 배송 완료일이 최근 ____개월 이내인 주문만 자동 처리 가능합니다.","answer":"1","acceptable_answers":["1"],"explanation":"배송 완료일이 최근 1개월 이내인 주문만 자동으로 구매확정 처리 가능합니다.","guide_ref":"주문관리 슬라이드 29"},{"id":"od_b_015","type":"ox","question":"엑셀로 여러 주문을 일괄 배송 처리할 수 있다.","answer":true,"explanation":"배송준비중 관리 하단의 '엑셀 일괄 배송 처리'에서 엑셀 양식 다운로드 후 수정하여 업로드하면 일괄 배송 처리 가능합니다.","guide_ref":"주문관리 슬라이드 4"},{"id":"od_b_016","type":"multiple_choice","question":"배송대기 상태는 주로 어떤 경우에 사용하나요?","choices":["고객이 배송 보류를 요청한 경우","택배 연동 서비스 사용 시","상품 재고가 부족한 경우","결제 확인 대기 중인 경우"],"answer":1,"explanation":"배송대기는 택배 연동 서비스 사용 시 주로 사용합니다. 연동택배 주문건의 경우 배송대기까지 처리하면 1~2시간 내 연동된 택배 시스템에 전달됩니다.","guide_ref":"주문관리 슬라이드 5"},{"id":"od_b_017","type":"ox","question":"휴대폰 결제는 부분취소가 지원된다.","answer":false,"explanation":"휴대폰 결제는 부분취소가 지원되지 않습니다. 다른 수단(적립금, 예치금, 무통장 등)으로 환불하거나 전체 취소 후 재주문을 안내해야 합니다.","guide_ref":"주문관리 슬라이드 22"},{"id":"od_b_018","type":"multiple_choice","question":"휴대폰 결제 취소가 가능한 기간은?","choices":["결제일로부터 7일","결제일로부터 30일","당월(1일~31일) 결제건만","제한 없음"],"answer":2,"explanation":"휴대폰 결제는 이동통신사 정책에 따라 당월(1일~31일) 결제건만 취소 가능합니다. 결제월이 지나면 다른 수단으로 환불해야 합니다.","guide_ref":"주문관리 슬라이드 22"},{"id":"od_b_019","type":"fill_blank","question":"현금영수증 발행 금액에는 ______가 포함되며, 적립금 사용 금액은 포함되지 않습니다.","answer":"배송비","acceptable_answers":["배송비"],"explanation":"현금영수증 발행 금액에 배송비는 포함되며, 적립금 사용 금액은 포함되지 않습니다.","guide_ref":"주문관리 슬라이드 31"},{"id":"od_b_020","type":"ox","question":"세금계산서는 작성일 기준으로 다음 달 10일까지 발행해야 하며, 지연 시 가산세가 부과된다.","answer":true,"explanation":"세금계산서는 작성일 기준 다음 달 10일까지 발행이 필요하며, 발행 지연 시 가산세가 부과됩니다.","guide_ref":"주문관리 슬라이드 37"},{"id":"od_b_021","type":"multiple_choice","question":"카페24 접속통계에서 '세션'이 종료되는 조건은?","choices":["페이지 이동 시","30분 경과 시","연결된 브라우저를 모두 종료하거나 2시간 이상 무조작 시","로그아웃 시"],"answer":2,"explanation":"연결된 브라우저를 모두 종료하거나 클릭/이동 등 조작 없이 2시간 이상 경과 시 세션이 종료됩니다.","guide_ref":"주문관리 슬라이드 47"},{"id":"od_b_022","type":"ox","question":"네이버페이 주문건은 카페24 어드민에서 교환처리가 가능하다.","answer":false,"explanation":"네이버페이 주문은 네이버페이센터에서만 교환처리 가능합니다. 또한 동일 상품만 교환 가능하며 옵션 변경은 불가합니다.","guide_ref":"주문관리 슬라이드 44"},{"id":"od_b_023","type":"multiple_choice","question":"네이버페이 가입 심사 소요 기간은?","choices":["즉시","1~2일","약 1주일","약 1개월"],"answer":2,"explanation":"네이버페이 가입 심사는 서류 접수 완료일부터 약 1주일 정도 소요됩니다.","guide_ref":"주문관리 슬라이드 40"},{"id":"od_b_024","type":"ox","question":"구매 확정 시 적립금을 즉시 지급하도록 설정할 수 있다.","answer":true,"explanation":"쇼핑몰 설정 > 고객 설정 > 적립금 설정에서 적립금 지급 시점을 '구매확정 후'로 설정하고 즉시 지급으로 변경하면 됩니다.","guide_ref":"주문관리 슬라이드 30"},{"id":"od_b_025","type":"fill_blank","question":"네이버페이 1차 승인 후 카페24 연동 시 입력해야 하는 3가지 인증키는 가맹점 인증키, 버튼인증키, ______ 입니다.","answer":"네이버공통인증키","acceptable_answers":["네이버공통인증키","네이버 공통 인증키","공통인증키"],"explanation":"네이버페이 승인 메일에서 가맹점 인증키, 버튼인증키, 네이버공통인증키를 확인하여 카페24에 입력합니다.","guide_ref":"주문관리 슬라이드 41"}]},"intermediate":{"world_id":"order","stage_id":"intermediate","title":"주문관리 중급","description":"취소/교환/반품/환불 프로세스·결제수단별 처리 (풀 25문항 중 14문항 랜덤 출제)","questions":[{"id":"od_m_001","type":"multiple_choice","question":"무통장 입금 주문건의 환불 처리 방법은?","choices":["PG사에서 자동 환불","운영자가 고객에게 직접 송금","적립금으로 자동 전환","카페24에서 자동 처리"],"answer":1,"explanation":"무통장 입금 주문건은 자동환불이 되지 않으므로 운영자가 구매자에게 직접 송금해야 합니다.","guide_ref":"주문관리 슬라이드 9"},{"id":"od_m_002","type":"multiple_choice","question":"카드결제 주문의 부분취소 시 주의해야 할 점은?","choices":["부분취소가 불가능하다","반드시 '신용카드 부분취소' 버튼을 클릭해야 한다. '전체취소' 버튼 클릭 시 전액 취소됨","PG사에 별도 요청해야 한다","고객이 직접 카드사에 연락해야 한다"],"answer":1,"explanation":"부분취소 시 반드시 '신용카드 부분취소' 버튼을 사용해야 합니다. '전체취소' 버튼을 클릭하면 결제 금액 전액이 취소되므로 주의가 필요합니다.","guide_ref":"주문관리 슬라이드 21"},{"id":"od_m_003","type":"multiple_choice","question":"교환 시 '동일 상품으로 교환' 기능은 어떤 경우에 사용하나요?","choices":["배송 전 단순 옵션 변경 요청 또는 판매자 이슈로 무상 교환이 필요한 경우","다른 상품으로 교환할 때","환불 후 재주문할 때","고객이 직접 처리할 때"],"answer":0,"explanation":"동일 상품 교환은 금액 변동 없이 동일 상품으로 교환하는 기능으로, 배송 전 옵션 변경이나 판매자 이슈 무상 교환 시 사용합니다.","guide_ref":"주문관리 슬라이드 11"},{"id":"od_m_004","type":"ox","question":"배송 후 교환 시 더 비싼 상품으로 교환하면 고객에게 차액을 무통장 입금으로 받아야 한다.","answer":true,"explanation":"배송 후 더 비싼 상품 교환 시 고객에게 차액 결제를 안내하고, 입금 확인 후 교환 처리를 진행합니다.","guide_ref":"주문관리 슬라이드 13"},{"id":"od_m_005","type":"multiple_choice","question":"반품 철회 시 PG 취소가 이미 완료된 경우 어떻게 해야 하나요?","choices":["자동으로 복구된다","PG사 관리자 페이지에서 승인 취소 철회 가능 여부를 확인 후 진행","고객에게 재결제를 요청","카페24 CS에 문의"],"answer":1,"explanation":"PG 취소 완료된 주문건의 철회는 PG사 관리자 페이지에서 승인 취소 철회가 가능한지 확인한 후 진행해야 합니다.","guide_ref":"주문관리 슬라이드 17"},{"id":"od_m_006","type":"fill_blank","question":"실시간 계좌이체 주문의 취소는 주문상세정보창에서 '계좌이체 전체취소' 또는 '계좌이체 ______' 버튼으로 처리합니다.","answer":"부분취소","acceptable_answers":["부분취소"],"explanation":"실시간 계좌이체 주문은 주문상세정보창에서 계좌이체 전체취소/부분취소 버튼 클릭 시 PG사에서 자동으로 취소됩니다.","guide_ref":"주문관리 슬라이드 20"},{"id":"od_m_007","type":"ox","question":"에스크로 결제건은 부분취소가 가능하다.","answer":false,"explanation":"에스크로 결제건은 부분취소가 불가합니다.","guide_ref":"주문관리 슬라이드 20"},{"id":"od_m_008","type":"multiple_choice","question":"교환 철회 시 추가 입금이 발생한 경우 어떻게 해야 하나요?","choices":["자동으로 환불된다","고객에게 다시 입금 받은 후 철회 진행","즉시 철회 가능","PG사에서 자동 처리"],"answer":1,"explanation":"교환처리 중 추가 입금이 발생했다면 고객에게 다시 입금을 받은 후 철회를 진행해야 합니다.","guide_ref":"주문관리 슬라이드 14"},{"id":"od_m_009","type":"multiple_choice","question":"'할인금액 자동계산' 기능의 설명으로 옳은 것은?","choices":["모든 주문에 소급 적용된다","설정 변경 시점부터 생성된 주문건에만 적용된다","할인을 자동으로 생성하는 기능이다","고객이 직접 할인율을 설정한다"],"answer":1,"explanation":"설정을 변경한 시점부터 생성된 주문건에만 할인금액 자동계산이 적용됩니다. 변경 시점 이전 주문에는 적용되지 않습니다.","guide_ref":"주문관리 슬라이드 39"},{"id":"od_m_010","type":"multiple_choice","question":"현금영수증 자동발행과 수동발행의 차이는?","choices":["발행 금액이 다르다","자동발행은 입금 완료/취소/반품 시 자동 처리, 수동발행은 운영자가 직접 처리","자동발행은 유료, 수동발행은 무료","차이 없음"],"answer":1,"explanation":"자동발행: 입금 완료/취소/반품 시 자동 처리(권장). 수동발행: 운영자가 직접 발행하고, 취소/반품 시에도 직접 수정 필요합니다.","guide_ref":"주문관리 슬라이드 32"},{"id":"od_m_011","type":"fill_blank","question":"현금영수증 의무발행 설정 사용 시, 고객이 발급을 원하지 않아도 구매 금액이 총 신청금액 이상이면 국세청 지정 번호(______)로 자진 발급됩니다.","answer":"010-000-1234","acceptable_answers":["010-000-1234"],"explanation":"의무발행 설정 사용 시 고객이 신청하지 않아도 국세청 지정 번호 010-000-1234로 자진 발급됩니다.","guide_ref":"주문관리 슬라이드 35"},{"id":"od_m_012","type":"multiple_choice","question":"네이버페이 주문의 반품 처리 시 유의사항은?","choices":["카페24에서 자유롭게 반품 처리 가능","반드시 상품 수거 확인 후 승인 처리 필요 (카페24에서 처리 시 환불까지 한번에 진행됨)","반품 불가","네이버페이 센터에서만 가능"],"answer":1,"explanation":"카페24에서 반품처리 시 네이버페이센터 승인 없이 반품+환불이 한번에 진행되므로 반드시 상품 수거 확인 후 처리해야 합니다.","guide_ref":"주문관리 슬라이드 44"},{"id":"od_m_013","type":"ox","question":"네이버페이 주문의 반품철회 및 반품거부는 카페24에서 처리 가능하다.","answer":false,"explanation":"반품철회 및 반품거부처리는 네이버페이 센터에서만 가능하며 카페24에서는 불가합니다.","guide_ref":"주문관리 슬라이드 44"},{"id":"od_m_014","type":"multiple_choice","question":"전자세금계산서 발행 시 ETAX에서 국세청 전송에 필요한 것은?","choices":["일반 비밀번호","범용 공인인증서","카페24 관리자 비밀번호","네이버 인증"],"answer":1,"explanation":"ETAX에서 국세청 전송 시 범용 공인인증서로 전자 서명 후 발행해야 합니다.","guide_ref":"주문관리 슬라이드 38"},{"id":"od_m_015","type":"ox","question":"연동택배 주문건의 배송 상태는 택배 시스템에 따라 자동으로 변경된다.","answer":true,"explanation":"연동택배 주문건은 배송대기까지 처리하면 1~2시간 내 연동된 택배 시스템에 전달되고, 이후 실제 배송 상태에 따라 자동 변경됩니다.","guide_ref":"주문관리 슬라이드 5"},{"id":"od_m_016","type":"multiple_choice","question":"네이버페이 주문에서 배송 지연 시 해야 할 조치는?","choices":["카페24에서 배송보류 처리","네이버페이 센터에서 배송보류 처리","고객에게 직접 연락","별도 조치 불필요"],"answer":1,"explanation":"재고 부족 등으로 배송 지연되는 경우 네이버페이 센터에서 배송보류처리를 진행해야 합니다. 미처리 시 패널티가 부과될 수 있습니다.","guide_ref":"주문관리 슬라이드 43"},{"id":"od_m_017","type":"fill_blank","question":"취소/교환/반품 접수 시 환불접수 처리 설정에는 '동시 처리'와 '______' 두 가지 옵션이 있습니다.","answer":"분리하여 처리","acceptable_answers":["분리하여 처리","분리 처리","분리하여 처리함"],"explanation":"환불접수 처리 설정: '동시에 처리함' 또는 '분리하여 처리함' 두 가지 옵션으로 나뉩니다.","guide_ref":"주문관리 슬라이드 24"},{"id":"od_m_018","type":"ox","question":"외부 주문(오픈마켓, 네이버페이, 카카오페이)은 어드민에서 구매 확정으로 변경하면 외부 채널에도 자동 연동된다.","answer":false,"explanation":"외부 주문은 어드민에서 구매 확정으로 바꿔도 외부 채널에는 연동되지 않습니다.","guide_ref":"주문관리 슬라이드 28"},{"id":"od_m_019","type":"multiple_choice","question":"예약주문에 대한 설명으로 틀린 것은?","choices":["교환이 제공되지 않음","취소 및 반품은 관리자에서 처리 가능","배송정보가 존재하지 않고 예약자 정보 확인 가능","카드결제만 가능"],"answer":3,"explanation":"예약주문은 교환 미제공, 취소/반품은 관리자 처리 가능, 배송정보 없이 예약자 정보 확인 가능합니다. 결제 수단 제한은 없습니다.","guide_ref":"주문관리 슬라이드 25~27"},{"id":"od_m_020","type":"multiple_choice","question":"배송비를 차감하고 환불하려면 어디서 설정하나요?","choices":["배송 설정 > 배송비 관리","취소/반품 처리 팝업 > 환불방식 > 배송비 적용여부 > 반품배송비 적용","고객에게 별도 송금 요청","자동으로 차감됨"],"answer":1,"explanation":"취소/반품 처리 시 환불방식의 배송비 적용여부에서 '반품배송비 적용 환불액에서 차감'을 선택하고 차감 금액을 기재합니다.","guide_ref":"주문관리 슬라이드 24"},{"id":"od_m_021","type":"ox","question":"네이버페이 판매 상품 중 교환/환불 불가 품목이 있으면 네이버페이 가입이 불가하다.","answer":true,"explanation":"쇼핑몰 판매 상품 중 교환/환불 불가 품목이 있는 경우 관련 법령 위반에 따라 네이버페이 가입이 불가합니다.","guide_ref":"주문관리 슬라이드 40"},{"id":"od_m_022","type":"multiple_choice","question":"네이버페이 버튼이 노출되지 않는 상품이 아닌 것은?","choices":["판매가 0원 상품","품절 상품","일반 판매 중인 상품","1+N 이벤트 등록 상품"],"answer":2,"explanation":"판매가 0원, 품절, 판매가 대체 문구 사용, 1+N 이벤트, 해외배송 상품 등은 네이버페이 버튼이 노출되지 않습니다. 일반 판매 중 상품은 정상 노출됩니다.","guide_ref":"주문관리 슬라이드 42"},{"id":"od_m_023","type":"fill_blank","question":"네이버페이 2차 심사 완료까지 영업일 기준 평균 ____일이 소요됩니다.","answer":"2","acceptable_answers":["2"],"explanation":"카페24에서 인증키 입력 후 네이버 2차 심사가 진행되며, 영업일 기준 평균 2일 소요됩니다.","guide_ref":"주문관리 슬라이드 41"},{"id":"od_m_024","type":"multiple_choice","question":"카페24 애널리틱스의 방문자 집계 방식은 기존 접속통계와 어떻게 다른가요?","choices":["둘 다 동일한 IP 기준","접속통계는 IP 기준, 애널리틱스는 세션과 쿠키 기준","애널리틱스는 회원 로그인 기준","접속통계만 정확함"],"answer":1,"explanation":"기존 접속통계는 IP 기준 순방문자 집계, 카페24 애널리틱스는 세션과 쿠키 기준으로 더 정확하게 집계합니다.","guide_ref":"주문관리 슬라이드 48"},{"id":"od_m_025","type":"ox","question":"일반 세금계산서는 국세청에 자동 전송된다.","answer":false,"explanation":"일반 세금계산서는 영수증 역할일 뿐 국세청에 전송되지 않습니다. 국세청 전송이 필요하면 전자세금계산서를 이용하거나 국세청에서 직접 발행해야 합니다.","guide_ref":"주문관리 슬라이드 36"}]},"advanced":{"world_id":"order","stage_id":"advanced","title":"주문관리 고급","description":"복합 CS 시나리오·결제수단별 환불·네이버페이 연동 (풀 25문항 중 13문항 랜덤 출제)","questions":[{"id":"od_a_001","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"무통장으로 결제한 주문을 취소하고 싶어요.\"\n\n처리 순서로 맞는 것은?","choices":["취소 접수 → PG 자동 환불 완료","취소 접수 → 환불 처리 → 운영자가 고객에게 직접 송금","취소 접수만 하면 자동 완료","고객에게 재주문 안내"],"answer":1,"explanation":"무통장 주문은 자동환불이 안 되므로 취소 접수 후 환불 처리를 진행하고, 운영자가 고객에게 직접 송금해야 합니다.","guide_ref":"주문관리 슬라이드 9, 20"},{"id":"od_a_002","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"카드로 결제한 상품 중 일부만 취소하고 싶어요.\"\n\n가장 주의해야 할 점은?","choices":["부분취소가 불가하므로 전체 취소 후 재주문 안내","주문상세정보에서 반드시 '신용카드 부분취소' 버튼 사용. '전체취소' 클릭 시 전액 취소됨","PG사에 별도 연락 필요","고객이 카드사에 직접 연락해야 함"],"answer":1,"explanation":"카드 부분취소 시 반드시 '신용카드 부분취소' 버튼을 사용해야 합니다. 실수로 '전체취소' 버튼을 클릭하면 결제 전액이 취소됩니다.","guide_ref":"주문관리 슬라이드 21"},{"id":"od_a_003","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"지난달에 휴대폰으로 결제했는데 취소해주세요.\"\n\n적절한 안내는?","choices":["즉시 휴대폰결제 취소 처리","당월 결제건만 취소 가능하므로, 다른 수단(적립금/예치금/무통장)으로 환불 안내","카드로 재결제 후 취소 안내","이동통신사에 직접 연락하라고 안내"],"answer":1,"explanation":"휴대폰 결제는 당월(1일~31일) 결제건만 취소 가능합니다. 결제월이 지난 경우 다른 수단으로 환불해야 합니다.","guide_ref":"주문관리 슬라이드 22"},{"id":"od_a_004","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"배송 완료된 상품을 교환하고 싶은데, 더 비싼 상품으로 바꾸고 싶어요.\"\n\n처리 순서는?","choices":["교환 불가 안내","차액 결제 안내 + 상품 반송 요청 → 입금 확인 → 수거완료 처리 → 교환 상품 배송","바로 교환 상품 발송","전체 취소 후 재주문 안내"],"answer":1,"explanation":"배송 후 더 비싼 상품 교환: 고객에게 차액 결제 안내 + 상품 반송 요청 → 입금 확인 → 수거완료 → 교환 상품 배송 순서입니다.","guide_ref":"주문관리 슬라이드 13"},{"id":"od_a_005","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"반품 처리를 했는데 다시 상품을 받고 싶어요. 반품 철회가 가능한가요?\"\n\n이미 반품완료 + 무통장 환불까지 된 경우 어떻게 하나요?","choices":["즉시 반품 철회 가능","무통장 입금으로 재입금을 받은 이후 철회 진행","철회 불가, 재주문만 가능","카페24 CS에 문의 필요"],"answer":1,"explanation":"이미 무통장 입금으로 환불 처리된 반품의 경우, 고객에게 재입금을 받은 후 철회를 진행해야 합니다.","guide_ref":"주문관리 슬라이드 17"},{"id":"od_a_006","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"에스크로 가상계좌로 결제했는데 배송 후 환불해주세요.\"\n\n처리 방법은?","choices":["PG사에서 자동 환불","반품처리 후 고객에게 직접 환불 (배송중/배송완료의 자세한 환불 방법은 PG사 문의 필요)","취소 버튼으로 즉시 처리","에스크로는 환불 불가"],"answer":1,"explanation":"에스크로 가상계좌 배송 후 환불은 반품처리 후 고객에게 직접 환불합니다. 배송중/배송완료 상태의 자세한 환불 방법은 PG사 문의가 필요합니다.","guide_ref":"주문관리 슬라이드 20"},{"id":"od_a_007","type":"multiple_choice","question":"[CS 시나리오]\n네이버페이 주문 고객: \"반품했는데 배송비를 차감하고 환불받고 싶어요.\"\n\n어디서 처리하나요?","choices":["카페24 어드민에서 배송비 차감 환불 처리","네이버페이 센터에서 처리 (부분환불은 네이버페이 센터에서만 가능)","양쪽 모두 가능","처리 불가"],"answer":1,"explanation":"네이버페이 주문의 반품 배송비 차감 등 부분환불은 네이버페이 센터에서만 가능합니다.","guide_ref":"주문관리 슬라이드 44"},{"id":"od_a_008","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"현금영수증을 신청하지 않았는데 발행해야 해요.\"\n\n운영자가 직접 발행하는 방법은?","choices":["발행 불가","전체주문조회에서 주문번호 클릭 → 결제정보 탭에서 현금영수증 신청 버튼 클릭","고객이 직접 국세청에서 발행","PG사에 요청"],"answer":1,"explanation":"고객이 신청하지 않은 경우에도 전체주문조회 → 주문상세정보 → 결제정보 탭에서 현금영수증 신청 버튼으로 운영자가 직접 발행 가능합니다.","guide_ref":"주문관리 슬라이드 33"},{"id":"od_a_009","type":"multiple_choice","question":"현금영수증 취소 가능 기간이 가장 짧은 PG사는?","choices":["KCP (18개월)","이니시스 (12개월)","스마트로 (3개월)","나이스페이 (12개월)"],"answer":2,"explanation":"스마트로는 3개월로 가장 짧습니다. KCP/헥토파이낸셜은 18개월, 올앳/이니시스/나이스페이/토스는 12개월입니다.","guide_ref":"주문관리 슬라이드 34"},{"id":"od_a_010","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"세금계산서를 신청했는데 자동으로 발행되나요?\"\n\n전자세금계산서 사용 시 자동 전송 조건은?","choices":["주문 즉시 전송","배송완료 약 1시간 후 ETAX로 자동 전송 (단, 취소/교환/환불 내역 있으면 자동 전송 안 됨)","매월 1일 일괄 전송","운영자가 수동으로만 전송"],"answer":1,"explanation":"전자세금계산서는 배송완료 후 약 1시간 뒤 ETAX로 자동 전송됩니다. 단, 취소/교환/환불 내역이 있으면 자동 전송되지 않습니다.","guide_ref":"주문관리 슬라이드 36"},{"id":"od_a_011","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"구매확정을 했는데 상품에 하자가 있어요. 반품 처리 가능한가요?\"\n\n적절한 처리는?","choices":["구매확정 후에는 반품 절대 불가","운영자가 구매 확정을 취소한 후 반품/교환 CS 처리 진행","고객이 직접 구매확정을 취소","카페24 CS에 문의하라고 안내"],"answer":1,"explanation":"구매확정 후에는 원칙적으로 취소/교환/반품이 불가하지만, 불가피한 경우 운영자가 구매 확정을 취소한 후 CS 처리를 진행할 수 있습니다.","guide_ref":"주문관리 슬라이드 28~29"},{"id":"od_a_012","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"쿠폰 사용해서 주문했는데 교환 처리하면 쿠폰 할인이 적용 안 돼요.\"\n\n이 상황에 대한 설명은?","choices":["쿠폰은 교환 시에도 자동 재적용됨","교환 처리 시 쿠폰 할인이 적용되지 않는 것은 정상 동작 (할인금액 자동계산 기능 참고)","시스템 오류이므로 JIRA 발행","쿠폰 재발급 후 재주문 안내"],"answer":1,"explanation":"교환 처리 시 기존 할인 혜택 조건이 충족되지 않으면 할인이 회수될 수 있습니다. 할인금액 자동계산 기능 설정에 따라 달라집니다.","guide_ref":"주문관리 슬라이드 39"},{"id":"od_a_013","type":"multiple_choice","question":"네이버페이 버튼 노출 설정에서 필요한 3곳의 설정 위치가 아닌 것은?","choices":["상품 수정창 > 판매정보 > 네이버페이 서비스 사용함","네이버 페이 설정 > 네이버페이 구매 버튼 노출 > 노출함","상품 분류 관리 > 제휴서비스 > 네이버페이 서비스 > 사용함","주문 설정 > 결제 방법 > 네이버페이 활성화"],"answer":3,"explanation":"네이버페이 버튼은 상품 수정창, 네이버 페이 설정, 상품 분류 관리 3곳에서 모두 설정해야 합니다. '주문 설정 > 결제 방법'은 해당 설정이 아닙니다.","guide_ref":"주문관리 슬라이드 42"},{"id":"od_a_014","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"반품배송비를 차감하고 환불받고 싶어요.\"\n\n'취소/교환/반품 접수와 환불접수를 동시에 처리함' 설정인 경우 처리 방법은?","choices":["별도 환불관리 메뉴에서 처리","취소/반품 처리 팝업에서 접수 시 환불방식의 배송비 적용여부에서 '반품배송비 적용 환불액에서 차감' 선택 후 금액 기재","고객에게 배송비 별도 입금 요청","자동으로 차감됨"],"answer":1,"explanation":"동시 처리 설정인 경우 취소/반품 접수 팝업에서 바로 환불방식 > 배송비 적용여부 > 반품배송비 적용 환불액에서 차감을 선택합니다.","guide_ref":"주문관리 슬라이드 24"},{"id":"od_a_015","type":"ox","question":"네이버페이 주문에서 배송지연처리 없이 장기간 배송이 진행되지 않으면 네이버페이 측에서 패널티를 부과할 수 있다.","answer":true,"explanation":"일정기간 배송지연처리 없이 배송이 진행되지 않으면 네이버페이 측에서 패널티를 부과할 수 있습니다. 재고 부족 시 네이버페이 센터에서 배송보류 처리가 필요합니다.","guide_ref":"주문관리 슬라이드 43"},{"id":"od_a_016","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"주문한 지 3일 됐는데 아직 입금 전 상태예요. 자동 취소되나요?\"\n\n확인해야 할 설정은?","choices":["배송 설정 > 자동 배송","쇼핑몰 설정 > 주문 설정 > 주문 후 설정 > 미입금 주문 자동 취소 설정 여부 및 기한","고객 설정 > 주문 제한","결제 설정 > 자동 취소"],"answer":1,"explanation":"쇼핑몰 설정 > 주문 설정 > 주문 후 설정에서 미입금 주문 자동 취소가 '사용함'인지, 기한이 몇 일로 설정되어 있는지 확인해야 합니다.","guide_ref":"주문관리 슬라이드 3"},{"id":"od_a_017","type":"ox","question":"KSNET을 이용하는 경우 현금영수증 서비스가 통합결제서비스(PG) 신청 시 자동 가입된다.","answer":false,"explanation":"KSNET을 이용하는 경우 자동 가입되지 않으므로 이니시스 현금영수증 서비스를 별도로 신청해야 합니다.","guide_ref":"주문관리 슬라이드 31"},{"id":"od_a_018","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"세금계산서 발행일이 지났는데 발행해주세요.\"\n\n적절한 안내는?","choices":["카페24 관리자에서 바로 발행 가능","발행일이 지난 건은 카페24에서 발행이 어려우며 국세청 e세로에서 직접 발행 필요. 가산세 관련은 국세청에 문의","PG사에 요청","발행 불가"],"answer":1,"explanation":"발행일이 지난 세금계산서는 쇼핑몰 관리자에서 발행이 어려우며, 국세청 e세로에서 직접 발행해야 합니다. 가산세 관련은 국세청에 문의가 필요합니다.","guide_ref":"주문관리 슬라이드 37"},{"id":"od_a_019","type":"multiple_choice","question":"[CS 시나리오]\n재고 수량체크 기준이 '결제기준'인데 고객이 주문만 하고 결제를 안 한 상태입니다. 재고가 차감되나요?","choices":["주문 시점에 차감됨","결제 완료 시점에 차감됨 (주문만으로는 미차감)","재고 관리와 무관","배송 시점에 차감됨"],"answer":1,"explanation":"재고 수량체크 기준이 '결제기준'이면 실제 결제된 주문건으로만 재고가 차감됩니다. 주문만으로는 차감되지 않으므로, 원하지 않으면 '주문기준'으로 변경이 필요합니다.","guide_ref":"상품관리 슬라이드 12"},{"id":"od_a_020","type":"ox","question":"네이버페이 주문건에서 특정 품목만 선택하여 반품처리가 가능하다.","answer":true,"explanation":"네이버페이 주문건은 전체 품목이 반품접수되더라도 특정 품목만 선택하여 반품처리가 가능합니다.","guide_ref":"주문관리 슬라이드 44"},{"id":"od_a_021","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"예약주문을 했는데 교환이 안 돼요.\"\n\n적절한 안내는?","choices":["예약주문은 교환이 제공되지 않음을 안내. 취소 후 재주문 방법 안내","시스템 오류이므로 확인 후 안내","교환 접수해드리겠다고 안내","배송완료 후 교환 가능하다고 안내"],"answer":0,"explanation":"예약주문의 경우 교환이 제공되지 않습니다. 취소 및 반품처리는 관리자에서 가능합니다.","guide_ref":"주문관리 슬라이드 25"},{"id":"od_a_022","type":"fill_blank","question":"카페24 애널리틱스에서 제공하는 유입 분석 기능으로, 어떤 광고가 매출에 기여했는지 확인할 수 있는 기능은 '______' 기능입니다.","answer":"인사이트","acceptable_answers":["인사이트","멀티 채널 분석"],"explanation":"카페24 애널리틱스는 멀티 채널 분석이나 구매 퍼널 분석 같은 인사이트 기능으로 어떤 광고가 매출에 기여했는지 등을 확인할 수 있습니다.","guide_ref":"주문관리 슬라이드 48"},{"id":"od_a_023","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"반품처리 완료 후 철회하고 싶은데, PG 취소가 이미 완료됐어요.\"\n\n처리 방법은?","choices":["즉시 철회 가능","PG사 관리자 페이지에서 승인 취소 철회가 가능한지 확인 후 철회 진행","철회 불가, 재주문만 가능","카페24에서 자동 복구"],"answer":1,"explanation":"PG 취소 완료된 주문건의 철회는 PG사 관리자 페이지에서 승인 취소 철회 가능 여부를 먼저 확인한 후 진행해야 합니다.","guide_ref":"주문관리 슬라이드 14, 17"},{"id":"od_a_024","type":"ox","question":"구매확정된 주문은 '전체 주문 조회'와 '배송 완료 조회' 메뉴에서 주문 상태를 '구매 확정'으로 검색 가능하다.","answer":true,"explanation":"구매 확정된 주문은 전체 주문 조회와 배송 완료 조회 메뉴에서 주문 상태를 '구매 확정'으로 설정하여 검색할 수 있습니다.","guide_ref":"주문관리 슬라이드 29"},{"id":"od_a_025","type":"multiple_choice","question":"[CS 시나리오]\n고객: \"네이버페이로 주문했는데 옵션을 변경하고 싶어요. 교환 가능한가요?\"\n\n적절한 안내는?","choices":["카페24에서 교환 접수 가능","네이버페이는 교환 시 동일 상품만 교환 가능하며 옵션 변경은 불가. 취소 후 재주문 안내","옵션 변경 교환은 네이버페이 센터에서 가능","상품 수정으로 옵션 변경 가능"],"answer":1,"explanation":"네이버페이 교환은 동일 상품만 가능하며 옵션 변경은 불가합니다. 옵션 변경이 필요하면 취소 후 재주문을 안내해야 합니다.","guide_ref":"주문관리 슬라이드 44"}]}}}};
const MANIFEST=QUIZ_BUNDLE.manifest;
const QUIZZES=QUIZ_BUNDLE.quizzes;
const GUIDES_FILES={youtube:"guide_youtube.html",order:"guide_order.html"};

let state={page:'login',userName:localStorage.getItem('cs_academy_user')||'',userData:null,currentQuiz:null,lastResult:null,guideWorld:'youtube'};
function userRef(n){return fireDb.collection('users').doc(n)}
async function loadUser(n){const d=await userRef(n).get();if(d.exists)return d.data();const u={name:n,total_xp:0,level:1,created_at:new Date().toISOString(),progress:{},badges:[],dismissed_wrong:[]};await userRef(n).set(u);return u}
async function saveUser(n,d){await userRef(n).set(d,{merge:true})}
async function logQuiz(n,w,s,q,c,a){await fireDb.collection('quiz_logs').add({user_name:n,world_id:w,stage_id:s,quiz_id:q,is_correct:c,user_answer:a,answered_at:new Date().toISOString()})}
async function getWrongQuizIds(n){const logs=await fireDb.collection('quiz_logs').where('user_name','==',n).get();const w=new Set(),c=new Set();logs.forEach(d=>{const x=d.data(),k=`${x.world_id}|${x.stage_id}|${x.quiz_id}`;if(x.is_correct)c.add(k);else w.add(k)});const dismissed=state.userData?.dismissed_wrong||[];return[...w].filter(k=>!c.has(k)&&!dismissed.includes(k)).map(k=>{const[wid,sid,qid]=k.split('|');return{wid,sid,qid}})}
function getLevelInfo(xp){const t=MANIFEST.level_thresholds;let cur=t[0],nxt=null;for(let i=0;i<t.length;i++){if(xp>=t[i].xp_required){cur=t[i];nxt=t[i+1]||null}}return{level:cur.level,title:cur.title,xp,nextXp:nxt?nxt.xp_required:null,nextTitle:nxt?nxt.title:null,progress:nxt?Math.round((xp-cur.xp_required)/(nxt.xp_required-cur.xp_required)*100):100}}
function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function sampleQuiz(wid,sid){const sc=MANIFEST.worlds.find(w=>w.id===wid).stages.find(s=>s.id===sid);const pool=JSON.parse(JSON.stringify(QUIZZES[wid][sid].questions));const sz=sc.sample_size||pool.length;let qs=shuffleArray(pool).slice(0,sz);if(sc.shuffle_choices)qs.forEach(q=>{if(q.type==='multiple_choice'&&q.choices){const ct=q.choices[q.answer];q.choices=shuffleArray(q.choices);q.answer=q.choices.indexOf(ct)}});return qs}
function checkAnswer(q,a){if(q.type==='ox')return q.answer?(a==='true'):(a==='false');if(q.type==='multiple_choice')return parseInt(a)===q.answer;if(q.type==='fill_blank'){const n=(a||'').replace(/\s/g,'').toLowerCase();return[q.answer,...(q.acceptable_answers||[])].some(x=>x.replace(/\s/g,'').toLowerCase()===n)}return false}
function isUnlocked(u,wid,sid){const s=MANIFEST.worlds.find(w=>w.id===wid)?.stages.find(s=>s.id===sid);if(!s?.unlock_condition)return true;const uc=s.unlock_condition;if(uc.type==='stage_clear'){const k=`${wid}_${uc.stage_id}`;return u.progress?.[k]?.status==='cleared'}return true}

const $=document.getElementById('app');
function render(){switch(state.page){case'login':return rLogin();case'map':return rMap();case'quiz':return rQuiz();case'result':return rResult();case'wrongnotes':return rWrong();case'dashboard':return rDash();case'guide':return rGuide()}}

function rLogin(){$.innerHTML=`<div class="login-wrap"><div class="login-card"><div style="font-size:56px">🎓</div><h1>CS Academy</h1><p class="sub">Cafe24 CS 상담사 온보딩 트레이닝</p><label>이름을 입력하세요</label><input type="text" id="ln" placeholder="예: 강정원" value="${state.userName}"><button onclick="doLogin()">시작하기</button><p class="hint">동일한 이름으로 재접속하면 진도가 이어집니다.</p></div></div>`;document.getElementById('ln')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})}
async function doLogin(){const n=document.getElementById('ln').value.trim();if(!n)return;state.userName=n;localStorage.setItem('cs_academy_user',n);$.innerHTML='<div class="loading">Loading...</div>';state.userData=await loadUser(n);state.page='map';await rMap()}
function doLogout(){state.userName='';state.userData=null;localStorage.removeItem('cs_academy_user');state.page='login';render()}

function nav(wc){return`<nav class="nav"><div class="nav-brand">🎓 CS Academy</div><div class="nav-links"><a onclick="goMap()" class="${state.page==='map'?'active':''}">맵</a><a onclick="goGuide()" class="${state.page==='guide'?'active':''}">학습 가이드</a><a onclick="goWrong()" class="${state.page==='wrongnotes'?'active':''}">오답노트${wc>0?`<span class="nav-badge">${wc}</span>`:''}</a><a onclick="goDash()" class="${state.page==='dashboard'?'active':''}">대시보드</a><a onclick="doLogout()" class="nav-logout">로그아웃</a></div></nav>`}

async function rMap(){const u=state.userData,l=getLevelInfo(u.total_xp),w=await getWrongQuizIds(u.name),wc=w.length;const logs=await fireDb.collection('quiz_logs').where('user_name','==',u.name).get();let tt=0,cc=0;logs.forEach(d=>{tt++;if(d.data().is_correct)cc++});const ac=tt?Math.round(cc/tt*100):0;const bg=(u.badges||[]);
let h=nav(wc)+`<div class="page"><div class="uc"><div class="uc-left"><div class="uc-avatar">👤<div class="uc-lvl">Lv.${l.level}</div></div><div><div class="uc-name">${u.name}</div><div class="uc-title">${l.title}</div><div class="xp-bar"><div class="xp-fill" style="width:${l.progress}%"></div></div><div class="xp-txt">${l.xp}${l.nextXp?' / '+l.nextXp+' XP → '+l.nextTitle:' XP (MAX)'}</div></div></div><div class="uc-stats"><div class="uc-stat"><div class="uc-stat-n">${tt}</div><div class="uc-stat-l">푼 문제</div></div><div class="uc-stat"><div class="uc-stat-n">${ac}%</div><div class="uc-stat-l">정답률</div></div><div class="uc-stat"><div class="uc-stat-n">${bg.length}</div><div class="uc-stat-l">배지</div></div></div></div>`;
if(bg.length)h+=`<div class="badges">${bg.map(id=>{const b=MANIFEST.badges.find(x=>x.id===id);return b?`<div class="bdg">${b.icon} ${b.name}</div>`:''}).join('')}</div>`;
if(wc>0)h+=`<div class="wb"><span>📝 오답노트에 ${wc}문제가 있어요!</span><a onclick="goWrong()">복습하러 가기 →</a></div>`;
for(const world of MANIFEST.worlds){h+=`<div class="world"><div class="world-hdr"><div class="world-icon">${world.icon}</div><div><div class="world-t">${world.title}</div><div class="world-s">${world.subtitle}</div></div></div><div class="stages">`;
for(const s of world.stages){const ul=isUnlocked(u,world.id,s.id),pk=`${world.id}_${s.id}`,p=(u.progress||{})[pk]||{},cl=p.status==='cleared',ps=QUIZZES[world.id][s.id].questions.length,cls=!ul?'locked':(cl?'cleared':'');
h+=`<div class="stg ${cls}"><div class="stg-icon">${ul?s.icon:'🔒'}</div><div class="stg-t">${s.title}</div><div class="stg-s">${s.subtitle}</div>`;
if(!ul)h+=`<div style="font-size:11px;color:var(--tx3);margin-bottom:8px;font-style:italic">이전 스테이지 클리어 필요</div><button class="stg-btn" disabled>잠김</button>`;
else{h+=`<div class="stg-meta"><div><span>최고점수</span><strong>${p.best_score||0}점</strong></div><div><span>도전</span><strong>${p.attempts||0}회</strong></div><div><span>통과기준</span><strong>${s.pass_score}점</strong></div><div><span>문항풀</span><strong>${ps}개 중 ${s.sample_size}개</strong></div></div><button class="stg-btn" onclick="startQuiz('${world.id}','${s.id}')">${cl?'재도전':(p.attempts>0?'이어하기':'시작하기')}</button>`;if(cl)h+=`<div class="cleared-mk">✓ 클리어</div>`}
h+=`</div>`}h+=`</div></div>`}h+=`</div>`;$.innerHTML=h}

function startQuiz(w,s){state.currentQuiz={wid:w,sid:s,questions:sampleQuiz(w,s),answers:{}};state.page='quiz';render()}

function rQuiz(){const{wid,sid,questions,answers}=state.currentQuiz;const world=MANIFEST.worlds.find(w=>w.id===wid),stage=world.stages.find(s=>s.id===sid),ps=QUIZZES[wid][sid].questions.length,ac=Object.keys(answers).filter(k=>answers[k]!==undefined&&answers[k]!=='').length;
let h=`<nav class="nav"><div class="nav-brand">🎓 CS Academy</div><div class="nav-links"><a onclick="goMap()">← 맵으로</a></div></nav><div class="page"><div class="quiz-hdr"><div style="font-size:11px;color:var(--tx2)">${world.title} › ${stage.title}</div><h2>${stage.title} ${stage.icon}</h2><div class="desc">${questions.length}문항 (풀 ${ps}개 중 랜덤 출제)</div><div class="quiz-meta"><span>⭐ ${stage.xp_per_question} XP/문항</span><span>🎯 통과 ${stage.pass_score}점</span></div></div>`;
questions.forEach((q,i)=>{h+=`<div class="qc"><div class="qn">문제 ${i+1} / ${questions.length}</div><div class="qt">${q.question.replace(/\n/g,'<br>')}</div>`;
if(q.type==='ox')h+=`<div class="ans-g ox"><div class="ans-o ox-yes ${answers[q.id]==='true'?'selected':''}" onclick="selAns('${q.id}','true')">O</div><div class="ans-o ox-no ${answers[q.id]==='false'?'selected':''}" onclick="selAns('${q.id}','false')">X</div></div>`;
else if(q.type==='multiple_choice')h+=`<div class="ans-g">${q.choices.map((c,ci)=>`<div class="ans-o ${answers[q.id]===''+ci?'selected':''}" onclick="selAns('${q.id}','${ci}')">${c}</div>`).join('')}</div>`;
else h+=`<div class="ans-g"><input class="blank-in" placeholder="답을 입력하세요" value="${answers[q.id]||''}" oninput="selAns('${q.id}',this.value)"></div>`;
h+=`</div>`});
h+=`<div class="submit-bar"><div class="prog"><b>${ac}</b> / ${questions.length} 답변 완료</div><button class="submit-btn ${ac===questions.length?'ready':''}" onclick="submitQuiz()">제출하고 결과 보기</button></div></div>`;$.innerHTML=h}

function selAns(qid,val){state.currentQuiz.answers[qid]=val;const ac=Object.keys(state.currentQuiz.answers).filter(k=>{const v=state.currentQuiz.answers[k];return v!==undefined&&v!==''}).length;const t=state.currentQuiz.questions.length;const p=document.querySelector('.prog');if(p)p.innerHTML=`<b>${ac}</b> / ${t} 답변 완료`;const b=document.querySelector('.submit-btn');if(b)b.classList.toggle('ready',ac===t);document.querySelectorAll('.qc').forEach(card=>{card.querySelectorAll('.ans-o').forEach(o=>{const oc=o.getAttribute('onclick');if(oc&&oc.includes(`'${qid}'`))o.classList.toggle('selected',oc.includes(`'${val}'`))})})}

async function submitQuiz(){const{wid,sid,questions,answers}=state.currentQuiz;const stage=MANIFEST.worlds.find(w=>w.id===wid).stages.find(s=>s.id===sid);const u=state.userData;const un=questions.filter(q=>!answers[q.id]&&answers[q.id]!=='0');if(un.length>0&&!confirm(`${un.length}문제가 남아있어요. 제출할까요?`))return;$.innerHTML='<div class="loading">채점 중...</div>';
let cc=0;const results=[];for(const q of questions){const ua=answers[q.id]||'';const ok=checkAnswer(q,ua);if(ok)cc++;let uc,crc;if(q.type==='multiple_choice'){uc=ua!==''?(q.choices[parseInt(ua)]||'(미응답)'):'(미응답)';crc=q.choices[q.answer]}else if(q.type==='ox'){uc=ua==='true'?'O':ua==='false'?'X':'(미응답)';crc=q.answer?'O':'X'}else{uc=ua||'(미응답)';crc=q.answer}results.push({...q,userAnswer:ua,userChoice:uc,correctChoice:crc,isCorrect:ok});await logQuiz(u.name,wid,sid,q.id,ok,ua)}
const tt=questions.length,sc=Math.round(cc/tt*100),wc=tt-cc,passed=sc>=stage.pass_score,xp=cc*stage.xp_per_question;const ol=u.level;u.total_xp+=xp;const lv=getLevelInfo(u.total_xp);u.level=lv.level;if(!u.progress)u.progress={};const pk=`${wid}_${sid}`,pv=u.progress[pk]||{status:'',best_score:0,attempts:0};u.progress[pk]={status:passed?'cleared':(pv.status==='cleared'?'cleared':'in_progress'),best_score:Math.max(pv.best_score||0,sc),attempts:(pv.attempts||0)+1};
if(!u.badges)u.badges=[];const nb=[];function tb(id){if(!u.badges.includes(id)){u.badges.push(id);const b=MANIFEST.badges.find(x=>x.id===id);if(b)nb.push(b)}}tb('first_step');if(passed)tb(`${wid}_${sid}`);if(passed&&sc===100){const wd=MANIFEST.worlds.find(w=>w.id===wid);if(wd.stages.every(s=>(u.progress[`${wid}_${s.id}`]||{}).best_score===100))tb(`${wid}_perfect`)}
const allWorlds=MANIFEST.worlds.every(wd=>wd.stages.every(s=>(u.progress[`${wd.id}_${s.id}`]||{}).status==='cleared'));if(allWorlds)tb('all_clear');
await saveUser(u.name,u);state.userData=u;state.lastResult={wid,sid,results,score:sc,correctCount:cc,wrongCount:wc,total:tt,passed,passScore:stage.pass_score,earnedXp:xp,newLevel:lv.level,newLevelTitle:lv.title,leveledUp:lv.level>ol,newBadges:nb};state.page='result';render()}

function rResult(){const r=state.lastResult;let h=`<nav class="nav"><div class="nav-brand">🎓 CS Academy</div><div class="nav-links"><a onclick="goMap()">← 맵으로</a></div></nav><div class="page"><div class="res-hero ${r.passed?'passed':'failed'}"><div style="font-size:56px">${r.passed?'🎉':'💪'}</div><h1>${r.passed?'고생하셨습니다! 통과!':'아쉽지만 다시 도전해봐요!'}</h1><div class="res-summary"><div class="rs-c"><div class="l">총 문제</div><div class="v">${r.total}</div></div><div class="rs-c"><div class="l">정답</div><div class="v">${r.correctCount}</div></div><div class="rs-c"><div class="l">오답</div><div class="v">${r.wrongCount}</div></div><div class="rs-c sc"><div class="l">점수</div><div class="v">${r.score}점</div></div></div><div class="res-sub">통과 기준 ${r.passScore}점</div><div class="gain"><div class="gain-c"><span>⭐</span>+${r.earnedXp} XP</div>${r.leveledUp?`<div class="gain-c lvl"><span>🎊</span>레벨업! → ${r.newLevelTitle} (Lv.${r.newLevel})</div>`:''}</div>${r.newBadges.length?`<div class="nb-area"><div class="nb-title">🏆 새 배지 획득</div><div class="nb-list">${r.newBadges.map(b=>`<div class="nb-card"><div class="i">${b.icon}</div><div class="n">${b.name}</div><div class="d">${b.desc}</div></div>`).join('')}</div></div>`:''}</div>`;
if(r.wrongCount>0)h+=`<div class="wb wb-r"><span>📝 ${r.wrongCount}문제를 틀렸어요!</span><a onclick="goWrong()">오답노트 바로가기 →</a></div>`;
const ws=r.results.filter(x=>!x.isCorrect),cs=r.results.filter(x=>x.isCorrect);
if(ws.length){h+=`<h2 class="sec-t">✗ 오답 문항</h2>`;ws.forEach((v,i)=>h+=rvCard(v,i+1,false))}
if(cs.length){h+=`<h2 class="sec-t ok-t">✓ 정답 문항 (클릭하여 펼치기)</h2>`;cs.forEach((v,i)=>h+=rvCard(v,i+1,true))}
h+=`<div class="actions"><button class="btn-p" onclick="goMap()">맵으로</button><button class="btn-s" onclick="startQuiz('${r.wid}','${r.sid}')">한 번 더 도전 (다른 문제!)</button></div></div>`;$.innerHTML=h}

function rvCard(v,i,ok){let h=`<div class="rv ${ok?'correct collapsed':'wrong'}" ${ok?'onclick="this.classList.toggle(\'collapsed\')"':''}>`;
h+=`<div class="rv-h"><div class="rv-num">${ok?v.question.substring(0,40)+(v.question.length>40?'...':''):'문제 '+i}</div><div class="rv-tag ${ok?'correct':'wrong'}">${ok?'✓ 정답':'✗ 오답'}</div></div><div class="rv-body"><div class="rv-q">${v.question.replace(/\n/g,'<br>')}</div>`;
if(!ok){h+=`<div class="rv-ar"><span class="lbl">내 답변:</span><span class="val wt">${v.userChoice}</span></div><div class="rv-ar"><span class="lbl">정답:</span><span class="val ct">${v.correctChoice}</span></div>`;
if(v.type==='multiple_choice'&&v.choices)h+=`<div class="rv-choices">${v.choices.map((c,ci)=>{let cls='';if(ci===v.answer)cls='cc';else if(''+ci===v.userAnswer&&ci!==v.answer)cls='wc';return`<div class="rv-ch ${cls}">${c}</div>`}).join('')}</div>`}
if(v.explanation)h+=`<div class="rv-exp"><div class="el">💡 해설</div><div class="et">${v.explanation}</div>${v.guide_ref?`<div class="er">📖 ${v.guide_ref}</div>`:''}</div>`;
h+=`</div></div>`;return h}

async function rWrong(){const u=state.userData,wi=await getWrongQuizIds(u.name);let h=nav(wi.length)+`<div class="page"><h1 style="font-size:22px;font-weight:800;margin-bottom:6px">📝 오답노트</h1><p style="color:var(--tx2);font-size:13px;margin-bottom:20px">아직 한 번도 맞추지 못한 문제들이에요.</p>`;
if(!wi.length)h+=`<div class="empty"><div class="ei">🎉</div><div class="et">오답이 없어요! 모든 문제를 맞추셨습니다.</div><button class="btn-p" onclick="goMap()">맵으로</button></div>`;
else{h+=`<button class="wn-clear-all" onclick="clearAllWrong()">🗑️ 오답노트 전체 초기화</button><div class="wn-bar">총 ${wi.length}개 문제</div>`;
wi.forEach(item=>{const q=QUIZZES[item.wid]?.[item.sid]?.questions.find(x=>x.id===item.qid);if(!q)return;
let ans;if(q.type==='multiple_choice')ans=`<div class="rv-choices" style="margin-bottom:10px">${q.choices.map((c,ci)=>`<div class="rv-ch ${ci===q.answer?'cc':''}">${c}${ci===q.answer?' ← 정답':''}</div>`).join('')}</div>`;
else if(q.type==='ox')ans=`<div class="wn-ans">정답: ${q.answer?'O (맞다)':'X (틀리다)'}</div>`;
else ans=`<div class="wn-ans">정답: ${q.answer}</div>`;
h+=`<div class="wn" onclick="event.target.closest('.wn-dismiss')?null:this.classList.toggle('open')"><div class="wn-h"><div class="wn-stg">${item.wid}/${item.sid}</div><div class="wn-prev">${q.question.substring(0,60)}${q.question.length>60?'...':''}</div><div class="wn-arr">▼</div></div><div class="wn-body"><div class="wn-q">${q.question.replace(/\n/g,'<br>')}</div>${ans}${q.explanation?`<div class="rv-exp"><div class="el">💡 해설</div><div class="et">${q.explanation}</div>${q.guide_ref?`<div class="er">📖 ${q.guide_ref}</div>`:''}</div>`:''}<div class="wn-actions"><button class="wn-dismiss" onclick="dismissWrong('${item.wid}|${item.sid}|${item.qid}')">✓ 이해했어요 (목록에서 제거)</button></div></div></div>`});
h+=`<div class="actions"><button class="btn-p" onclick="goMap()">맵으로</button></div>`}
h+=`</div>`;$.innerHTML=h}

async function dismissWrong(key){const u=state.userData;if(!u.dismissed_wrong)u.dismissed_wrong=[];u.dismissed_wrong.push(key);await saveUser(u.name,{dismissed_wrong:u.dismissed_wrong});state.userData=u;goWrong()}
async function clearAllWrong(){if(!confirm('오답노트를 전부 초기화할까요?'))return;const wi=await getWrongQuizIds(state.userData.name);const u=state.userData;if(!u.dismissed_wrong)u.dismissed_wrong=[];wi.forEach(i=>u.dismissed_wrong.push(`${i.wid}|${i.sid}|${i.qid}`));await saveUser(u.name,{dismissed_wrong:u.dismissed_wrong});state.userData=u;goWrong()}

async function rGuide(){const wc=(await getWrongQuizIds(state.userData.name)).length;const gw=state.guideWorld;let h=nav(wc)+`<div class="page"><h1 style="font-size:22px;font-weight:800;margin-bottom:6px">📖 학습 가이드</h1><p style="color:var(--tx2);font-size:13px;margin-bottom:16px">퀴즈를 풀기 전에 가이드를 먼저 읽어보세요!</p>`;
h+=`<div class="guide-tabs">`;MANIFEST.worlds.forEach(w=>{h+=`<div class="guide-tab ${gw===w.id?'active':''}" onclick="state.guideWorld='${w.id}';rGuide()">${w.icon} ${w.title}</div>`});h+=`</div>`;
const guideFile=GUIDES_FILES[gw];
if(guideFile){h+=`<iframe src="${guideFile}" style="width:100%;height:calc(100vh - 220px);border:2px solid var(--bd);border-radius:12px;background:var(--sf)"></iframe>`}else{h+=`<div class="guide-section"><p>가이드가 아직 준비되지 않았습니다.</p></div>`}
h+=`<div class="actions" style="margin-top:16px"><button class="btn-p" onclick="goMap()">맵으로 돌아가기</button></div></div>`;$.innerHTML=h}


async function rDash(){const u=state.userData,l=getLevelInfo(u.total_xp);const logs=await fireDb.collection('quiz_logs').where('user_name','==',u.name).get();let tt=0,cc=0;logs.forEach(d=>{tt++;if(d.data().is_correct)cc++});const ac=tt?Math.round(cc/tt*100):0;const bg=(u.badges||[]).map(id=>MANIFEST.badges.find(b=>b.id===id)).filter(Boolean);
let h=nav(0)+`<div class="page"><h1 style="font-size:22px;font-weight:800;margin-bottom:16px">📊 ${u.name} 학습 현황</h1><div class="dash-g"><div class="dc"><div class="dc-l">레벨</div><div class="dc-v">${l.level}</div><div class="dc-s">${l.title}</div></div><div class="dc"><div class="dc-l">총 XP</div><div class="dc-v">${l.xp}</div><div class="dc-s">${l.nextXp?'다음 '+(l.nextXp-l.xp)+' XP':''}</div></div><div class="dc"><div class="dc-l">정답률</div><div class="dc-v">${ac}%</div><div class="dc-s">${cc} / ${tt}</div></div><div class="dc"><div class="dc-l">배지</div><div class="dc-v">${bg.length}</div><div class="dc-s">개</div></div></div>`;
for(const w of MANIFEST.worlds){h+=`<div style="background:var(--sf);padding:16px 20px;border-radius:10px;margin-bottom:14px"><h3 style="font-size:15px;font-weight:800;margin-bottom:10px">${w.icon} ${w.title}</h3><table class="dash-tbl"><thead><tr><th>스테이지</th><th>상태</th><th>최고점수</th><th>도전</th><th>문제풀</th></tr></thead><tbody>`;
for(const s of w.stages){const p=(u.progress||{})[`${w.id}_${s.id}`]||{},ul=isUnlocked(u,w.id,s.id),ps=QUIZZES[w.id][s.id].questions.length;h+=`<tr><td><strong>${s.icon} ${s.title}</strong></td><td>${!ul?'🔒':p.status==='cleared'?'✅':p.attempts>0?'🏃':'⏸'}</td><td>${p.best_score||0}점</td><td>${p.attempts||0}회</td><td>${ps}개 중 ${s.sample_size}개</td></tr>`}
h+=`</tbody></table></div>`}
if(bg.length)h+=`<h2 class="sec-t">획득 배지</h2><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">${bg.map(b=>`<div class="dc" style="text-align:center"><div style="font-size:32px">${b.icon}</div><div style="font-weight:800;font-size:13px;margin-top:4px">${b.name}</div><div style="font-size:10px;color:var(--tx2)">${b.desc}</div></div>`).join('')}</div>`;
h+=`</div>`;$.innerHTML=h}

async function goMap(){state.page='map';await rMap()}
async function goWrong(){state.page='wrongnotes';await rWrong()}
async function goDash(){state.page='dashboard';await rDash()}
async function goGuide(){state.page='guide';await rGuide()}

(async function(){if(state.userName){$.innerHTML='<div class="loading">Loading...</div>';try{state.userData=await loadUser(state.userName);state.page='map';await rMap()}catch(e){console.error(e);state.page='login';render()}}else render()})();

</script>
</body>
</html>
